enum DefiAccountState {
  UNKNOWN

  """
  The account is predicted.
  This state is typically reserved for SmartContractWallets, because they require deployment.
  The predicted state means the user has no deployed MagicWallet yet, but this is the wallet address they would get if they decided to deploy in this exact instant.
  The predicted address will change everytime the user adds or removes a FIDO keys from his Coinbase Account.
  """
  ACCOUNT_PREDICTED

  """
  For EOA (like web3 wallet):
  The wallet is usable and registered in our internal record.
  
  For Smart Contract Wallets (like MagicWallet):
  The Account is not usable yet. User committed to this account, but it's in the process of deploying to the blockchain.
  Waiting a couple seconds should finalize the state. If the deployment fails this account will return back to the predicted state.
  """
  ACCOUNT_REGISTERED

  """
  State for Smart Contract Wallets only.
  The Smart Contract Wallet is deployed and the account is usuable.
  """
  ACCOUNT_DEPLOYED
}

enum DefiAccountType {
  """
  An account controlled by anyone with the private keys. This category is used for the retail MPC wallet.
  """
  EXTERNALLY_OWNED

  """
  A smart contract deployed to the network, controlled by code. This category is used for the retail SCW.
  """
  CONTRACT
}

