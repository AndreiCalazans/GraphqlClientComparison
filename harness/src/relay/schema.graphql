"""
A single system-imposed gate on a user action — the durable statement of *what*
is gated, *why*, and *how* it lifts. The frontend risk SDK renders directly from
this and enforcement reads the same state. Restrictions are delivered inside the
`RiskRestriction` collection (which carries the stable Relay id); that collection
is returned from both `viewer.risk.restrictions` and product mutation payloads that
implement `RiskRestricted`.
"""
type RiskRestriction {
  """
  How broadly the gate applies — the whole user, a domain, or a single product.
  """
  scope: RiskRestrictionScope

  """
  The activity that triggered this restriction. Null for ambient /
  standing restrictions with no triggering action.
  """
  activity: RiskActivity

  """
  Whether this restriction's lifecycle is bound to its triggering `activity`.
  Cancelling that activity lifts a bound restriction; an unbound restriction only
  references it as context and stands on its own (e.g. an account-level gate the
  action merely surfaced).
  """
  isActivityBound: Boolean

  """
  The steps that must all be satisfied to lift this gate. The gate lifts once
  every dependency is satisfied.
  """
  dependencies: [RiskDependency]
}

type RiskRestrictions {
  """
  Relay cache identifier, stable per (viewer, action). Lets the inline (mutation) and standing (viewer) reads normalize to one record.
  """
  id: ID

  """
  The active restrictions gating this action for the viewer. Empty when the action
  is unrestricted. The frontend risk SDK renders directly from this list.
  """
  active: [RiskRestriction]

  """
  Whether or not there are challenge(s) that need to be completed to resolve the risk restriction
  """
  hasChallenge: Boolean @deprecated(reason: "Use `active`; derive presence from a non-empty list.")
}

"""How broadly a restriction applies."""
enum RiskRestrictionScope {
  USER
  DOMAIN
  PRODUCT
}

