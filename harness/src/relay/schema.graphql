Structured result from HL /exchange, mirroring the proto oneof result discriminator.
ORDER/MODIFY/BATCH_MODIFY variants produce BaseAppHyperliquidOrderResult,
CANCEL/CANCEL_BY_CLOID produce BaseAppHyperliquidCancelResult, and all remaining
variants (SEND_ASSET, APPROVE_AGENT, APPROVE_BUILDER_FEE, UPDATE_LEVERAGE,
UPDATE_ISOLATED_MARGIN, SCHEDULE_CANCEL, SET_REFERRER) produce BaseAppHyperliquidDefaultResult.
