"""
A PaymentLinkPage is the durable, reusable, buyer-facing template that
references a MerchantProduct (inheriting its pricing) and owns the reuse
policy, buyer-info form, agent availability flag, and success/fail
redirects. Buyers mint a one-shot PaymentLink off this page via the
public `mintPaymentLinkFromPaymentLinkPage` mutation.
"""
type PaymentLinkPage {
  id: ID

  """
  UUID of the merchant business entity that owns this page. Used to scope
  downstream lookups (e.g. the `product` field's entity-scoped PLM fetch) on
  both the authenticated merchant surface and the unauthenticated buyer
  surface, where there is no caller identity to derive it from.
  """
  entityId: ThirdPartyIdString

  """
  Stable, globally-unique, customer-shareable identifier (UUID v4).
  Suitable for use in public buyer-facing URLs.
  """
  uuid: Uuid

  """
  UUID of the MerchantProduct whose pricing this page inherits. Prefer
  the `product` field when you need the catalog data; this raw id is kept
  for lightweight clients and for symmetry with the `paymentLinkPages`
  `productId` filter.
  """
  productId: ThirdPartyIdString

  """
  The MerchantProduct this page references and inherits its pricing from,
  resolved on demand. The authenticated merchant surface returns the full
  product (including internal ids); the unauthenticated buyer surface
  returns the public projection with internal identifiers stripped.
  `null` if the referenced product can no longer be read.
  """
  product: MerchantProduct

  """
  Current lifecycle state. ACTIVE pages mint new PaymentLinks; PAUSED stops
  minting but preserves the page; DEACTIVATED is terminal.
  """
  status: PaymentLinkPageStatus

  """
  Reuse cap. `null` = uncapped; `1` = single-use; `N` = capped at N mints.
  """
  maxUses: Int

  """Number of PaymentLinks minted from this page so far."""
  mintCount: Int

  """
  Number of PaymentLinks minted from this page that have settled (been
  paid). The settled subset of `mintCount`. Drives the "X of N paid" settled
  count in the list/detail UI.
  """
  paidCount: Int

  """
  Whether this page has reached its reuse cap and can no longer mint new
  PaymentLinks. `true` only when `maxUses` is set (`> 0`) and
  `paidCount >= maxUses`; an uncapped page (`maxUses` null or `0`) is never
  sold out. Drives the Sold-out badge.
  """
  isSoldOut: Boolean

  """Buyer-info form: which fields the buyer must fill in at checkout."""
  needsBuyerName: Boolean
  needsBuyerEmail: Boolean
  needsBuyerPhone: Boolean
  needsBuyerShippingAddress: Boolean

  """When true, this page supports an agent-assisted flow."""
  supportsAgent: Boolean

  """
  Where buyers are redirected after a successful payment via a
  PaymentLink minted from this page.
  """
  successRedirectUrl: String

  """Where buyers are redirected after a failed payment."""
  failRedirectUrl: String
  createdBy: String
  modifiedBy: String
  createdAt: Time
  updatedAt: Time

  """
  The PaymentLinks minted from this page, paginated newest-first. Backs
  the PaymentLinkPage detail panel's per-page payment history. Reuses the
  `PaymentLinkConnection`/`PaymentLinkEdge` shapes from the top-level
  viewer `paymentLinks` connection.
  
  Authenticated merchant surface only: the public buyer projection
  (`paymentLinkPageByUuid`) strips the internal page id this field needs to
  scope the query, so it resolves to `null` there rather than exposing a
  merchant's payment history to anonymous callers. PLM enforces the merchant
  boundary via entity_id — a page belonging to a different merchant yields no
  rows.
  """
  paymentLinks(first: Int, after: String): PaymentLinkConnection
}

input PaymentLinkPageBuyerInfoInput {
  name: String
  email: String
  phone: String
  shippingAddress: PaymentLinkPageShippingAddressInput
}

type PaymentLinkPageConnection {
  edges: [PaymentLinkPageEdge]
  pageInfo: PageInfo
}

type PaymentLinkPageEdge {
  cursor: String
  node: PaymentLinkPage
}

input PaymentLinkPageShippingAddressInput {
  line1: String
  line2: String
  city: String
  state: String
  postalCode: String
  country: String
}

"""
Orders `paymentLinkPages` results by created-at. Independent of the Relay
pagination direction (`first`/`after` vs `last`/`before`): direction selects
forward/backward page traversal, `sortOrder` selects the order rows are
returned in. Defaults to newest-first (`DESC`) when omitted.
"""
enum PaymentLinkPageSortOrder {
  """Oldest first (created-at ascending)."""
  ASC

