  execution: SendExecution
}

"""
An error indicating that the wallet has sufficient total balance for the requested
Bitcoin transfer, but a portion of UTXOs is currently locked by unconfirmed (pending)
transactions, leaving the spendable subset insufficient to cover the requested amount
plus fees.

Unlike `InsufficientBalanceError` (where the user genuinely lacks funds), this error
signals a transient state that resolves once the blocking pending transactions confirm
and any change is returned to the wallet. Clients should surface a "wait for pending
transactions to confirm" message rather than a generic insufficient-funds message.
"""
type PendingTransactionsBlockingError implements BaseAppError {
  """the correlation ID of the error"""
  correlationId: ThirdPartyIdString

  """the trace ID of the error"""
  traceId: ThirdPartyIdString

  """
  The total amount of cryptocurrency currently locked by pending (unconfirmed)
  transactions, denoted in the smallest unit of the network's native asset
  (satoshis for Bitcoin).
  
  This is an integer value (bigint) serialized as a base-10 string to avoid
  the int53/int64 overflow risk inherent in JavaScript Number. Clients MUST
  parse it with a bigint-capable parser (e.g. BigInt, bn.js) and MUST NOT
  use floating-point parsing — there is no fractional component.
  """
  lockedCryptoAmount: String
}

