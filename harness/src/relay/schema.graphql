"""
An individual tax lot from the tax center, representing a single acquired
position with its cost basis, amounts, and data quality flags.
"""
type TaxCenterTaxLot {
  """The unique identifier of the tax lot"""
  id: ID

  """The original amount of the tax lot in the asset's currency"""
  originalAmount: Amount

  """The current remaining amount of the tax lot in the asset's currency"""
  currentAmount: Amount

  """The cost basis amount in the taxable currency"""
  costBasis: Amount

  """Data quality and source flags for this tax lot"""
  flags: TaxCenterTransactionFlags

  """
  The date the cost basis was established (may predate the transaction date)
  """
  costBasisDate: Time

  """The current market value of the tax lot"""
  marketValue: Amount

  """The market price at time of valuation"""
  marketPrice: Amount

  """Metadata from the cost basis source (e.g. CoinTracker)"""
  costBasisSourceMetadata: String

  """Whether this tax lot was created from a split operation"""
  isSplitLot: Boolean

  """Whether this tax lot is covered for tax reporting purposes"""
  coveredStatus: TaxCenterTransactionCoveredStatus

  """The underlying transaction type (e.g. buy, sell, transfer)"""
  txType: String
}

"""
A transaction from the tax center, containing acquisition and/or disposition
details along with cost basis, tax impact, and data quality information.
"""
type TaxCenterTransaction {
  """Relay-style unique identifier"""
  id: ID

  """The transaction UUID"""
  uuid: Uuid

  """The date from the ledger"""
  date: Time

  """The date from account history"""
  txDate: Time

  """Aggregated flags from associated lots"""
  flags: TaxCenterTransactionFlags

  """Acquisition details, present if there is an underlying opened tax lot"""
  acquisition: TaxCenterTransactionAcquisition

  """Disposition details, present if a tax lot was disposed"""
  disposition: TaxCenterTransactionDisposition

  """The tax impact classification of this transaction"""
  taxImpact: TaxCenterTransactionTaxImpact

  """Indicates whether this transaction is covered for tax reporting"""
  coveredStatus: TaxCenterTransactionCoveredStatus

  """
  Tax lots with missing cost basis data, including associated receive transaction UUIDs
  """
  missingCostBasisTaxLots: [TaxCenterMissingCostBasisTaxLot]
}

"""
Acquisition details for a tax center transaction, representing the opening of a tax position.
"""
type TaxCenterTransactionAcquisition {
  """The amount acquired in the asset's currency"""
  acquired: Amount

  """The cost basis amount in the taxable currency"""
  costBasis: Amount

  """Whether this acquisition is classified as income"""
  isIncome: Boolean

  """The market price at time of acquisition"""
  marketPrice: Amount

  """The underlying opened tax lots (typically a single entry)"""
  openedTaxLots: [TaxCenterTaxLot]
}

"""
Indicates whether a tax center transaction is covered for tax reporting purposes.
"""
enum TaxCenterTransactionCoveredStatus {
  """Covered status has not been determined"""
  UNSPECIFIED

  """Transaction is covered"""
  COVERED

  """Transaction is conditionally covered"""
  CONDITIONALLY_COVERED

  """Transaction is not covered"""
  NOT_COVERED
}

"""
Disposition details for a tax center transaction, representing the closing of a tax position.
Includes short-term and long-term gain/loss breakdowns.
"""
type TaxCenterTransactionDisposition {
  """Short-term portion of the gain or loss"""
  shortTerm: TaxCenterTransactionGainLoss

  """Long-term portion of the gain or loss"""
  longTerm: TaxCenterTransactionGainLoss

  """The total gain or loss"""
  gainLoss: TaxCenterTransactionGainLoss

  """The acquired amount in source currency"""
  acquired: Amount

  """The market price at time of disposition"""
  marketPrice: Amount

  """The underlying disposed tax lots"""
  disposedTaxLots: [TaxCenterDisposedTaxLot]
}

"""Aggregated data quality and source flags from associated tax lots."""
type TaxCenterTransactionFlags {
  """Whether cost basis information is missing"""
  hasMissingCostBasis: Boolean

  """Whether proceeds information is missing"""
  hasMissingProceeds: Boolean

  """Whether cost basis was provided by the user"""
  hasUserCostBasis: Boolean

  """Whether proceeds were provided by the user"""
  hasUserProceeds: Boolean
}

"""Gain or loss details for a tax center transaction disposition."""
type TaxCenterTransactionGainLoss {
  """The disposed amount in source currency"""
  disposed: Amount

  """The cost basis amount in taxable currency"""
  costBasis: Amount

  """The proceeds amount in taxable currency"""
  proceeds: Amount

  """The realized gain or loss amount in taxable currency"""
  realized: Amount

  """Whether this represents a gain"""
  isGain: Boolean

  """Whether this represents a loss"""
  isLoss: Boolean
}

"""Classification of the tax impact for a tax center transaction."""
enum TaxCenterTransactionTaxImpact {
  """Tax impact has not been determined"""
  UNSPECIFIED

  """No tax impact"""
  NONE

  """Transaction is classified as income"""
  INCOME

  """Transaction results in a capital gain or loss"""
