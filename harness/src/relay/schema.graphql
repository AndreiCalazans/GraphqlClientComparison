type CreatorRewards {
  """Enrollment stats for the current user"""
  enrollment: CreatorRewardsEnrollment

  """Lifetime leaderboard all users"""
  lifetimeLeaderboard(first: Int! = 25, after: String, fiatCurrencyCode: CurrencyCode): CreatorRewardsLifetimeLeaderboardConnection

  """Payout history for the current user"""
  payoutHistory(first: Int! = 25, after: String, fiatCurrencyCode: CurrencyCode): CreatorRewardsPayoutHistoryConnection

  """Aggregated payout for the last 7 days"""
  lastWeeklyPayout(fiatCurrencyCode: CurrencyCode): CreatorRewardsAggregatedPayout

  """Aggregated creator rewards payout for a custom time window"""
  aggregatedCreatorRewards(start: Time!, end: Time!, fiatCurrencyCode: CurrencyCode): CreatorRewardsAggregatedPayout

  """Fee rewards for Zora coins owned by the current user"""
  feeRewards(first: Int!, after: String): CreatorRewardsFeeRewardConnection

  """Fee reward aggregate across the provided window"""
  aggregateFeeReward(start: Time!, end: Time, fiatCurrencyCode: CurrencyCode): AggregateFeeReward

  """
  Aggregated total earnings across all three creator reward categories for a custom time window.
  
  This aggregates:
  1. Creator token earnings - rewards earned from creator tokens (Zora coins)
  2. Fee rewards - rewards earned from trading fees on Zora coins owned by the creator
  3. Creator rewards payouts - weekly payouts from the creator rewards program
  
  All earnings are converted to the requested fiat currency and summed together.
  The conversion uses current exchange rates at the time of the query.
  
  Window semantics: start is inclusive, end is exclusive (UTC).
  """
  aggregatedTotalEarnings(
    """Inclusive start of the aggregation window (UTC)"""
    start: Time!

    """Exclusive end of the aggregation window (UTC)"""
    end: Time!

    """
    The fiat currency code to convert earnings to (e.g., USD, EUR). Defaults to USD if not provided.
    """
    fiatCurrencyCode: CurrencyCode

    """
    If true, excludes creator coin earnings from the total. Defaults to false.
    """
    shouldExcludeCreatorCoin: Boolean
  ): CreatorRewardsAggregatedPayout
}

type CreatorRewardsAggregatedPayout {
  """
  Total payout formatted as a decimal string with up to 6 fractional digits
  """
  totalPayout: String

  """
  The fiat currency code actually applied to the amount. If conversion failed or was not requested, this will be USD.
  """
  fiatCurrencyCode: CurrencyCode

  """Inclusive start of the effective window (UTC)"""
  effectiveStart: Time

  """Exclusive end of the effective window (UTC)"""
  effectiveEnd: Time
}

