  payments(statuses: [PaymentStatusInput!], startDate: Time, endDate: Time, paymentMethodIds: [ThirdPartyIdString!], cursor: String, first: Int = 10, after: String, accountUuid: Uuid): PaymentConnection

  """The summary of the rewards"""
  rewardsSummary(accountUuid: Uuid): RewardSummary

  """The list of rewards"""
  rewards(first: Int = 3, after: String, accountUuid: Uuid): RewardTransactionConnection

