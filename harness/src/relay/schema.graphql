  assetUuids: [Uuid!]
  entityIds: [String!]

  """Entity param fetch overrides"""
  entityParams: [EntityParamsInput!]

  """Asset CBRNs to filter relevant entities"""
  assetCbrns: [String!]

  """
  When true, components whose relevant_entities carry asset CBRN tags are
  filtered out unless the request's assetCbrns contains a matching CBRN.
  Components without CBRN tags are unaffected. Default false.
  """
  exactMatch: Boolean

  """
  Controls whether components without any CBRN tags pass the assetCbrns filter.
  Presence-aware: omitting the field preserves legacy behavior (untagged pass through).
  When false, only components whose CBRN tags match the request are eligible.
  When true, matching tagged components plus untagged components are eligible.
  Has no effect when assetCbrns is empty.
  """
  includeUntagged: Boolean
}

