  """
  tokenId: ThirdPartyIdString

  """Number of outcome shares held, decimal string."""
  shares: String

  """
  Weighted-average fill price for the held outcome [0,1], decimal string.
  """
  averagePrice: String

  """Current mark price for the held outcome [0,1], decimal string."""
  currentPrice: String

  """
  Unrealized profit and loss on currently held shares; signed USD decimal string.
