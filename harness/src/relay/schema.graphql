  """
  CoinbaseSubscriptionPlansV2 is a structured response of the available plans for a user.
  
  Response structure is hierarchical. At the root are tiers, in ascending order of value. Tiers have plans.
  Each tier has a list of plans and separately, pause plans. Plans are sorted by billing frequency, shorter plans prior
  to longer plans.
  
  Additionally, at the root is a default plan. This plan should be the plan that is presented by default for the user.
  - The default plan will be present in its respective tier, in the correct placement in the sorted tier and plans.
  - The default plan for a subscriber will be their current paid plan (if on free trial, their target paid plan).
  - The default plan's tier will determine the tier to present. With the tier sorting and plan sorting by billing
  frequency the user can navigate to it's adjacent plans/tiers.
  
  In comparison to CoinbaseSubscriptionPlans, no free trial plans will be found in the response. Free trials will
  instead be embedded as free_trial_metadata in the paid plan.
  e.g.
  default_plan: basic_monthly_plan
  tiers:
  - basic_tier:
  - - plans:
  - -- basic_monthly_plan
  - -- basic_annual_plan
  - - pause_plans:
  - -- basic_pause_plan
  - premium_tier
  - - plans:
  - -- premium_monthly_plan
  - -- premium_annual_plan
  - - pause_plans:
  - -- premium_pause_plan
  """
