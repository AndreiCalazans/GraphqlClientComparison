"""
A mutation representing a transfer of native BTC.

Derived from the prepared transaction's inputs and outputs:
- `fromAddresses`: deduplicated input addresses (Bitcoin transactions can
   spend UTXOs from multiple addresses)
- `toAddress`: the first non-change output address (the recipient)
- `value`: sum of all non-change output values, in satoshis
"""
type BaseAppBitcoinTokenTransferMutation {
  """unique ID for the mutation"""
  id: ID

  """the network on which the transfer takes place"""
  networkId: NetworkId

  """
  the input addresses from which the BTC is being sent (multiple inputs possible)
  """
  fromAddresses: [String]

  """the address to which the BTC is being sent (the non-change output)"""
  toAddress: String

  """the amount of BTC being sent in satoshis (sum of non-change outputs)"""
  value: String

  """the recipient identity of the transfer"""
  recipientIdentity: Identity

  """the asset being transferred (always native BTC)"""
  transferAsset: BaseAppBitcoinToken
}

"""Details about a Bitcoin transaction"""
type BaseAppBitcoinTransactionDetails implements BaseAppChainTransactionDetails {
  """The ID of the transaction"""
  id: ID

  """The id of the prepared call parameters"""
  uuid: Uuid

  """The current status of the transaction"""
  transactionStatus: BaseAppBitcoinOnchainTransactionStatus

  """The onchain details of the transaction, if available"""
  onchainDetails: BaseAppBitcoinTransactionOnchainDetails

  """
  The onchain mutations describing what will happen as a result of this
  transaction being accepted by the network. Aggregated upstream from the
  transaction's non-change outputs (a transfer to the largest recipient with
  the summed amount), so pending Bitcoin rows can render recipient/amount/USD
  info on parity with confirmed rows. Reuses the same `BaseAppBitcoinOnchainMutation`
  union exposed by the transaction-preparation flow so frontends can share a
  single rendering pipeline.
  
  Note: `fromAddresses` on the inner `BaseAppBitcoinTokenTransferMutation` is
  not populated here because the upstream `BitcoinTransferOnchainMutation` proto
  only carries the aggregated recipient and amount for the pending tx list.
  """
  onchainMutations: [BaseAppBitcoinOnchainMutation]
}

