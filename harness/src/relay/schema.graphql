  richTextTitle: UIComponentRichTextField
  richTextDescription: UIComponentRichTextField
  textFields: [UIComponentTextField]
  richTextFields: [UIComponentRichTextField]
}

"""UI Component CTA"""
type UIComponentCta {
  text: String
  url: String
  backgroundColor: String
  textColor: String
  isExternalLink: Boolean

  """Icon displayed before the button label."""
  startIcon: UIComponentIcon

  """Icon displayed after the button label."""
  endIcon: UIComponentIcon
}

"""UI Component Custom Relevant Entity"""
type UIComponentCustomEntity {
  title: String
  description: String
  detail: String
  subDetail: String
  iconUrl: String
