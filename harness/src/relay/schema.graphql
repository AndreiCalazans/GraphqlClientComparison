"""
Error response for initiateAccountingConnect mutation. Clients branch on the
machine-readable `reason`; `description` is an unlocalised English fallback.
"""
type InitiateAccountingConnectError implements ActionableErrorBase & ErrorV2 {
  """
  From ActionableErrorBase. Correlation id for tracing this error to backend
  logs / third-party systems.
  """
  correlationId: ThirdPartyIdString!

  """
  Machine-readable failure class. Stable contract; FE should branch on this
  rather than on `description` (unlocalised English). The resolver always
  populates this for any Error variant it returns; nullable only because the
  subgraph no-non-null-assertion rule forbids `!` on object-type fields.
  """
  reason: InitiateAccountingConnectErrorReason

  """Readable, localised, merchant-friendly error title."""
  title: String

  """Best-effort English fallback for log/debug. FE should prefer `reason`."""
  description: String

  """
  From ActionableErrorBase. Always null today; populate when product provides
  per-reason CTAs.
  """
  cta: Cta
}

"""
Machine-readable classification of an initiateAccountingConnect failure. The FE
branches on `reason` to render its own localised copy; `description` is a
best-effort English fallback for log/debug surfaces.
"""
enum InitiateAccountingConnectErrorReason {
  """Caller failed auth or eligibility."""
  UNAUTHORIZED

  """
  Accounting integrations are not yet available (feature flag off / stub).
  """
  UNAVAILABLE

  """Unexpected backend error. Transient; retry safe."""
  INTERNAL_ERROR
}

