"""
The amount to quote or convert. Exactly one field must be set; this is enforced
at the schema layer via @oneOf.
"""
input FxAmountInput {
  """Pre-fee source amount as a decimal string."""
  sourceAmount: String

  """Pre-fee target amount as a decimal string."""
  targetAmount: String
}

"""
A Simple FX conversion lifecycle record. A conversion is multi-leg and
asynchronous; poll via viewer.fx until status is COMPLETED or FAILED.
"""
type FxConversion {
  """GraphQL/Relay id for this conversion."""
  id: ID

  """
  Raw fiat-bridge conversion id. Pass this as
  FxProperties.fxConversionById(conversionId:) to poll this conversion.
  """
  conversionId: ThirdPartyIdString

  """Current lifecycle status of the conversion."""
  status: FxConversionStatus

  """Source currency ticker (e.g. GBP)."""
  sourceCurrency: TickerSymbol

  """Target currency ticker (e.g. USD)."""
  targetCurrency: TickerSymbol

  """The rate and amounts agreed at quote time."""
  quote: FxQuoteDetail

  """The executed rate and amounts, set once the FX leg has filled."""
  fill: FxFillDetail

  """Populated only when status is FAILED."""
  error: FxConversionErrorDetail

  """When the conversion was created."""
  createdAt: Time

  """When the conversion reached a terminal status, if it has."""
  completedAt: Time
}

"""Detail for a conversion that reached the FAILED status."""
type FxConversionErrorDetail {
  """Machine-readable error code."""
  code: String

  """Human-readable error message."""
  message: String

  """Which workflow leg failed (e.g. quote, fill, transfer)."""
  leg: String
}

"""Lifecycle status for a Simple FX conversion."""
enum FxConversionStatus {
  """Conversion accepted, not yet started."""
  PENDING

  """FX leg is executing against a venue."""
  CONVERTING

  """FX leg filled; ledger transfer in progress."""
  TRANSFERRING

  """Conversion completed successfully."""
  COMPLETED

  """Conversion failed; no funds moved, user made whole in source currency."""
  FAILED

  """
  A status not yet modeled by this schema — returned when the fiat-bridge
  backend introduces a new status before the schema is updated. Clients
  should treat this as a non-terminal, unrecognized state.
  """
  UNKNOWN
}

"""A single fee line applied to a Simple FX quote."""
type FxFee {
  """Fee amount as a decimal string."""
  amount: String

  """Currency ticker the fee is denominated in."""
  currency: TickerSymbol

  """Fee category/kind (e.g. spread, network)."""
  feeType: String
}

"""The executed rate and amounts for the FX fill leg."""
type FxFillDetail {
  """Executed rate, target per 1 source, as a decimal string."""
  rate: String

  """Executed source amount as a decimal string."""
  sourceAmount: String

  """Executed target amount as a decimal string."""
  targetAmount: String

  """Slippage vs the quoted rate as a decimal string."""
  slippage: String

  """When the fill occurred."""
  filledAt: Time
}

"""
Organizational type grouping the authenticated user's Simple FX rates and
conversion lookups.
"""
type FxProperties {
  """
  Indicative, display-only FX rates for currency pairs supported for the
  authenticated user's entity. Optional filters narrow the returned set.
  
  Filter semantics:
  - Both omitted → the full pair matrix supported for the user's entity.
  - sourceCurrency only → all pairs starting from that currency (powers the
    "Convert to" tray).
  - targetCurrency only → all pairs ending at that currency (powers the
    "Convert from" tray).
  - Both set → zero or one FxRate (the specific pair). Reverse direction is
    NOT implied — spreads are directional; USD→GBP is a distinct pair from
    GBP→USD.
  
  Unsupported filter values (e.g. a currency the user's entity does not
  offer) return an empty list, not an error.
  
  Rates are NOT locked or executable — use createFxQuote to obtain a firm,
  fee-inclusive quote before executing a conversion. Backed by the
  fiat-bridge ListRates RPC.
  """
  fxRates(
    """Filter to rates originating from this currency (e.g. GBP)."""
    sourceCurrency: TickerSymbol

    """Filter to rates ending at this currency (e.g. USD)."""
    targetCurrency: TickerSymbol
  ): [FxRate]

  """
  Look up a single Simple FX conversion by its conversion id. Used to poll a
  specific conversion until it reaches a terminal status. Backed by the
  fiat-bridge GetConversion RPC.
  """
  fxConversionById(conversionId: ThirdPartyIdString!): FxConversion

  """
  Look up a single Simple FX conversion by the idempotencyKey used to execute
  it. Lets a client recover/track the exact conversion it initiated and poll it
  until it reaches a terminal status. Backed by the fiat-bridge GetConversion
  RPC.
  """
  fxConversionByIdempotencyKey(idempotencyKey: String!): FxConversion
}

"""A firm, fee-inclusive Simple FX quote."""
type FxQuote {
  """GraphQL/Relay id for this quote. Do not pass to executeFxConversion."""
  id: ID

  """
  Raw fiat-bridge quote id. Pass this as ExecuteFxConversionInput.quoteId to
  execute the conversion against this quote.
  """
  quoteId: ThirdPartyIdString

  """Source currency ticker (e.g. GBP)."""
  sourceCurrency: TickerSymbol

  """Target currency ticker (e.g. USD)."""
  targetCurrency: TickerSymbol

  """Target per 1 source, pre-fee, as a decimal string."""
  rate: String

  """Pre-fee source amount as a decimal string."""
  sourceAmount: String

  """Pre-fee target amount as a decimal string."""
  targetAmount: String

  """
  Coinbase consumer fees applied to this quote, distinct from venue fees.
  """
  coinbaseFees: [FxFee]

  """Originating satellite/venue that priced the quote."""
  venue: String

  """When the quote expires."""
  expiresAt: Time

  """When the quote was issued."""
  quotedAt: Time
}

"""The rate and amounts agreed at quote time for a conversion."""
type FxQuoteDetail {
  """The quote this conversion executed against."""
  quoteId: ThirdPartyIdString

  """Target per 1 source, pre-fee, as a decimal string."""
  rate: String

  """Pre-fee source amount as a decimal string."""
  sourceAmount: String

  """Pre-fee target amount as a decimal string."""
  targetAmount: String

  """Originating satellite/venue that priced the quote."""
  venue: String

  """When the quote expires."""
  expiresAt: Time

  """When the quote was issued."""
  quotedAt: Time
}

"""
An indicative, display-only FX rate for a single currency pair. Not executable.
"""
type FxRate {
  """Source currency ticker (e.g. GBP)."""
  sourceCurrency: TickerSymbol

  """Target currency ticker (e.g. USD)."""
  targetCurrency: TickerSymbol

  """
  Units of targetCurrency per 1 unit of sourceCurrency, as a decimal string.
  """
  targetRate: String

  """When this indicative rate expires."""
  expiresAt: Time
}

