"""
Output mirror of RbaInstrumentGroupsSearchFilterInput. GraphQL forbids using an
input type as the type of an output field, so this object type mirrors the input
so the FE can round-trip the filter back into the instrumentGroups resolver when a
section/pill is tapped. Mirrors RbaEventHubFilter's approach in event_hub_schema.graphql.
"""
type RbaInstrumentGroupsSearchFilter {
  instrumentGroupType: RbaInstrumentGroupCategory
  sector: RbaInstrumentGroupSector
  sectorId: ThirdPartyIdString
  tag: String
  scope: String
  marketOpenState: RbaMarketOpenState
  competition: String
  competitionScope: String
  frequency: RbaInstrumentGroupFrequency
  isFeatured: Boolean
  eventHubTag: String
  liveEventStatus: RbaLiveEventStatus
  liveEventStatuses: [RbaLiveEventStatus]

  """
  When true, instrument groups that are embedded sub-groups of another (e.g. SPREAD/TOTAL markets) are excluded from results.
  """
  hideEmbeddedInstrumentGroups: Boolean

  """
  When true, only instrument groups with parlay constraints (parlay-eligible events) are returned.
  """
  isParlayEligible: Boolean

  """
  When set, only returns GAME instrument groups that have an embedded sub-group of the given type (SPREAD returns games with spread ladder data; TOTAL returns games with total ladder data). UNSPECIFIED is a no-op.
  """
  hasEmbeddedInstrumentGroup: RbaEmbeddedInstrumentGroup

  """
  When true, hides child instrument groups with specific configured tags from results. Output mirror of RbaInstrumentGroupsSearchFilterInput.excludeTaggedChildInstrumentGroups (renamed to satisfy the boolean-verb-prefix lint rule, which only applies to output objects).
  """
  hideTaggedChildInstrumentGroups: Boolean

  """
  When true, hides instrument groups that belong to a series (e.g. rolling 15-min crypto binaries). Output mirror of RbaInstrumentGroupsSearchFilterInput.excludeSeriesInstrumentGroups (renamed to satisfy the boolean-verb-prefix lint rule, which only applies to output objects).
  """
  hideSeriesInstrumentGroups: Boolean
}

input RbaInstrumentGroupsSearchFilterInput {
  instrumentGroupType: RbaInstrumentGroupCategory
  sector: RbaInstrumentGroupSector
  sectorId: ThirdPartyIdString
  tag: String
  scope: String
  marketOpenState: RbaMarketOpenState
  competition: String
  competitionScope: String
  frequency: RbaInstrumentGroupFrequency
  isFeatured: Boolean
  eventHubTag: String
  liveEventStatus: RbaLiveEventStatus
  liveEventStatuses: [RbaLiveEventStatus!]

  """
  When true, instrument groups that are embedded sub-groups of another (e.g. SPREAD/TOTAL markets) are excluded from results.
  """
  hideEmbeddedInstrumentGroups: Boolean

  """
  When true, only instrument groups with parlay constraints (parlay-eligible events) are returned.
  """
  isParlayEligible: Boolean

  """
  When set, only returns GAME instrument groups that have an embedded sub-group of the given type (SPREAD returns games with spread ladder data; TOTAL returns games with total ladder data). UNSPECIFIED is a no-op.
  """
  hasEmbeddedInstrumentGroup: RbaEmbeddedInstrumentGroup

  """Deprecated: use excludeTaggedChildInstrumentGroups instead."""
  includeTaggedChildInstrumentGroups: Boolean @deprecated(reason: "Use excludeTaggedChildInstrumentGroups instead.")

  """
  When true, excludes child instrument groups with specific configured tags from results.
  """
  excludeTaggedChildInstrumentGroups: Boolean

  """
  When true, excludes instrument groups that belong to a series (e.g. rolling 15-min crypto binaries).
  """
  excludeSeriesInstrumentGroups: Boolean
}

