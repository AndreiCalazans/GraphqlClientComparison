"""
Entrypoint into the Defi Borrow product.

Defi Borrow allows users to borrow against their crypto (BTC, ETH, CBETH, ...) assets using our MagicWallet (MagicPlatform's self-custodial smart wallet).
Collateral is deposited into a decentralized protocol (e.g. Morpho, Aave, etc.) and users can borrow against it (typically USDC).
"""
type DefiBorrow {
  """
  Summary of the user Defi Borrow activity for quick lookup. Shortcuts to avoid fetching full data.
  """
  userSummary: DefiBorrowUserSummary

  """Summary of the user's positions across all markets"""
  portfolioSummary: DefiBorrowPortfolioSummary

  """
  The minimum borrow APR available across all eligible markets for the user. Expressed as a decimal between 0 and 1 (e.g. 0.03 = 3%). Null if the user has no eligible markets.
  """
  minBorrowApr: Decimal

  """Returns the list of eligible markets for this user."""
  markets(filter: DefiBorrowMarketFilterInput, order: DefiBorrowMarketOrderInput): [DefiBorrowMarket]

  """Returns a list of loans for the user."""
  loans(filter: DefiBorrowLoanFilterInput, order: DefiBorrowLoanOrderInput): [DefiBorrowLoan]

  """Return a single loan for the user."""
  loan(filter: DefiBorrowLoanFilterInput): DefiBorrowLoan

  """Returns a list of pending transactions for the user."""
  pendingBorrowTransactions(filter: DefiBorrowPendingTransactionFilterInput): [DefiBorrowPendingTransaction]

  """
  Fallback website information for emergency collateral top-up during outages.
  """
  fallbackWebsite: DefiBorrowFallbackWebsite

  """
  User-scoped collateral funding sources across all eligible markets, deduped
  per (sourceAsset, variant) and optionally annotated with the user's active
  loans backed by that source.
  """
  collateralSources(filter: DefiBorrowCollateralSourcesFilterInput): [DefiBorrowCollateralSource!]!

  """
  User-scoped loan options across protocols (variable-rate + fixed-rate Morpho
  Midnight) for a given (sourceAssetAmsUuid, variant) pair.
  """
  loanOptions(
    """AMS UUID of the platform source asset."""
    sourceAssetAmsUuid: Uuid!

    """Source variant (PRIMARY or STAKED)."""
    variant: DefiBorrowCryptoSourceVariant!

    """Optional intent filter (eligibility / active-loan)."""
    filter: DefiBorrowLoanOptionsFilterMode
  ): [DefiBorrowLoanOption!]!
}

"""DefiBorrowAddCollateralQuoteInput"""
input DefiBorrowAddCollateralQuoteInput {
  """core quote fields"""
  core: DefiBorrowQuoteCoreInput!

  """
  Collateral source variant. Defaults to UNSPECIFIED (backward-compatible; treated as PRIMARY by the backend) if omitted. Silently ignored if the resolved payment method is not a crypto fund source.
  """
  variant: DefiBorrowCryptoSourceVariant

  """
  Set when this quote immediately follows a staked-asset wrap (e.g. SOL → jitoSOL). When true, backend calls FAS GetAccountByCurrency with ReadType=PRIMARY, bypassing the Portfolio Service cache and Ledger REPLICA replication lag. When false or omitted, uses the standard Portfolio Service path.
  """
  isPostWrapQuote: Boolean
}

