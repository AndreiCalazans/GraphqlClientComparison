type CreditCardAccount {
  """The unique relay identifier for this credit type"""
  id: ID!

  """
  The universal unique identifier for this credit card's financial account.
  """
  uuid: Uuid

  """The financial account details for this credit card."""
  accountDetails: CreditCardAccountDetails

  """The financial account details for this credit card by id."""
  status: CreditCardAccountStatus

  """
  The delinquency status indicating the current payment status of the credit card account.
  """
  delinquencyStatus: DelinquencyStatus

  """Actor that initiated the current account status change."""
  statusActor: StatusActor

  """Current user action status indicating pending user-initiated actions"""
  userActionStatus: UserActionStatus

  """The timestamp when this account was created."""
  createdAt: Time

  """The timestamp when the account status was last updated."""
  currentStatusAt: Time

  """
  Timestamp when user requested account closure.
  Only set when userActionStatus is PENDING_ACCOUNT_CLOSE.
  """
  closureRequestedAt: Time

  """The card offering type for this account."""
  cardOffering: CreditCardCardOffering

  """The access token for this credit card account."""
  accessToken(skipRefresh: Boolean): String

  """A signed JWT for direct authentication with the card issuer SDK."""
  signedJwt: String

  """The card view token for this credit card account."""
  cardViewToken(
    accessToken: String

    """
    Optional proof token for 2FA validation (required for first-time virtual card view).
    If not provided, the token request will proceed without 2FA validation where allowed.
    """
    proofToken: String

    """
    Optional 2FA action string identifying the user action that initiated the 2FA challenge.
    Used by the backend to verify the proof token was minted for the correct action.
    Example values: "web-retail-cardDetails", "mobile-retail-creditCardDetails".
    """
    action: String
  ): String

  """
  The card view token with mandatory 2FA verification for web clients.
  This field enforces 2FA on every call and is intended for web clients that require
  stricter authentication on every card view. Mobile clients should continue using
  `cardViewToken` with `isCreditCardViewAuthorized` for their 2FA flow.
  """
  webCardViewToken(
    """Required 2FA proof token obtained from a completed 2FA challenge."""
    proofToken: String!

    """
    Required 2FA action string identifying the user action that initiated the 2FA challenge.
    Used by the backend to verify the proof token was minted for the correct action.
    Example value: "web-retail-cardDetails".
    """
    action: String!
  ): String

  """The account preferences for this credit card account."""
  accountPreferences: CreditCardAccountPreferences

  """
  Check if the user is authorized to view credit card details for this account.
  Returns a boolean indicating whether the user has the necessary permissions and has completed any required authentication steps.
  """
  isCreditCardViewAuthorized: Boolean

  """
  Computed flags indicating account management capabilities and account state.
  Derived from status, delinquencyStatus, statusActor, and userActionStatus.
  No additional service calls are made; all data comes from the parent account object.
  """
  accountManagementFlags: AccountManagementFlags

  """
  The restriction banner that should be displayed for this account.
  Returns null when the account is in good standing, when no restriction applies,
  or when account details required to resolve the banner could not be fetched.
  
  Derived from account status flags, card offering (secured vs. unsecured),
  past-due payment, balance, and pending CB1 membership action. First matching
  condition wins.
  """
  restrictionBanner: CreditCardRestrictionBanner

  """
  Whether the user can currently request a replacement for a card on this
  account, and if not, why. Backed by the servicing-api
  GetCardReplacementEligibility RPC; clients use this to gate the Replace
  CTA so users don't see a generic system-error screen for a state the
  backend already knows about.
  
  The mutation remains authoritative — races between this query and the
  mutation are handled by typed reasons on CreditCardActionableError.
  
  The set of gates depends on the user's intended replacement reason:
  FIRST_CARD requires an ON_HOLD physical card, while every other reason
  rejects an ON_HOLD physical card. Omit intendedReason to assume a
  non-FIRST_CARD intent (the common case from the Replace flow).
  """
  replacementEligibility(intendedReason: CardReplacementReasonInput): CardReplacementEligibility

  """
  Referral program information for this credit card account.
  Includes the user's unique referral link, referral statistics, and campaign status.
  """
  referrals: CreditCardReferrals

  """The autopay schedule for this credit card account."""
  autopaySchedule: AutopaySchedule

  """
  List of physical and virtual cards associated with this account (fetched via servicing).
  """
  accountCards: AccountCardsResponse

  """
  Billing address associated with this account (fetched from issuer via servicing).
  """
  billingAddress: CreditCardBillingAddress
}

