  """Relay ID - do not use"""
  id: ID

  """The loan unique identifier."""
  uuid: Uuid

  """Create at timestamp of the loan."""
  createdAt: Date @deprecated(reason: "Use openedAt instead")

  """OPEN or CLOSED status of the loan."""
  status: DefiBorrowLoanStatus

