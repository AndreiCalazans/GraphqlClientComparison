"""
A prediction market sourced from an upstream provider (e.g. Polymarket). Field
set mirrors wallet-search's Polymarket fan-out response 1:1 so that APPS-1896
can wire the resolver without any shape translation. USD-denominated fields
are surfaced as decimal strings — clients should parse with a Decimal library
(never native floats) to avoid binary-float rounding. Fiat conversion and
priced-order-book detail are out of scope for this schema and will ship in
follow-ups when product commits to those surfaces.
"""
type BaseAppPredictionMarket {
  """
  Opaque GraphQL identifier (provider-scoped) for client cache normalization.
  """
  id: ID

  """
  Provider-scoped event identifier. For Polymarket this is the Gamma event id
  (not a tradable `condition_id`). Present on every entry; search cards click
  through at the event level. Tradable ids live exclusively on
  `outcomes[].conditionId` — there is no top-level tradable-id field by
  design, so clients cannot accidentally treat `eventId` as tradable.
  """
  eventId: ThirdPartyIdString

  """Upstream venue that sourced this market."""
  provider: BaseAppPredictionMarketProvider

  """Primary display title."""
  title: String

  """Secondary display line (often a disambiguator or rules snippet)."""
  subtitle: String

  """Long-form description / rules."""
  description: String

  """
  Canonical categories this market belongs to. Empty when no upstream tag
  matched a canonical value; otherwise ordered by Polymarket's upstream tag
  order. Consumers iterate — there is no primary-category signal.
  """
  categories: [BaseAppPredictionMarketCategory]

  """Raw Polymarket tag slugs passed through verbatim (already lowercased)."""
  tags: [String]

  """Hero image URL."""
  imageUrl: String

  """Square icon URL suited to list rows."""
  iconUrl: String

  """Upstream permalink (e.g. https://polymarket.com/event/<slug>)."""
  url: String

  """
  Tradable outcomes for this event. Binary markets expose two outcomes
  labeled 'Yes' / 'No'; categorical markets expose one outcome per underlying
  market. Null / empty when upstream did not surface a usable set.
  
  Deprecated: returns the full unbounded list, which can be hundreds of
  entries on large categorical markets (e.g. World Cup) and bloats the
  Hub feed payload by ~250KB. Use `outcomesConnection(first:)` together
  with `totalOutcomes` instead — the Hub renders ~3 outcomes per card
  and only needs the count for the rest.
  """
  outcomes: [BaseAppPredictionMarketOutcome] @deprecated(reason: "Use `outcomesConnection(first:)` + `totalOutcomes`. The unbounded list is a payload-bloat hazard on large markets and will be removed once mobile clients migrate.")

  """
  Paginated tradable outcomes for this event. Forward-only Relay-style
  connection over the same underlying outcome set as `outcomes`, ordered
  by upstream relevance. Hub callers should request a small `first`
  (typically 3), optionally apply `closedFilter`, and read `totalOutcomes`
  for the unfiltered count. Default page size when `first` is omitted is
  3, matching the Hub-card default; max is clamped to the size of the
  underlying outcomes list. Empty connection (with `hasNextPage: false`)
  when upstream did not surface a usable outcome set.
  """
  outcomesConnection(
    """
    Page size in [1, totalOutcomes]; values <= 0 or omitted use the Hub default (3).
    """
    first: Int

    """Opaque cursor from a prior `pageInfo.endCursor`."""
    after: String

    """
    Server-side filter for the outcome `isClosed` state. Null/UNSPECIFIED returns all outcomes.
    """
    closedFilter: BaseAppPredictionMarketOutcomeClosedFilter
  ): BaseAppPredictionMarketOutcomeConnection

  """
  Total number of tradable outcomes for this event, regardless of any
  page size applied to `outcomesConnection`. Reflects the unfiltered
  upstream count after dropping rows missing `conditionId`. Surfaced as
  nullable to match the schema convention for count-style fields (see
  `commentCount`); resolvers always populate it (including `0` when
  upstream did not surface a usable outcome set), so clients can treat
  `null` and `0` interchangeably.
  """
  totalOutcomes: Int

  """Market open time."""
  startDate: Time

  """Market close / resolution time."""
  endDate: Time

  """Rolling 24h notional volume as a USD decimal string."""
  volume24h: String

  """Lifetime notional volume as a USD decimal string."""
  volumeTotal: String

  """Current order-book liquidity as a USD decimal string."""
  liquidity: String

  """Total open interest as a USD decimal string."""
  openInterest: String

  """Number of upstream comments (for social surfaces)."""
  commentCount: Int

  """True when upstream has flagged this market as editorially featured."""
  isFeatured: Boolean

  """True when upstream has flagged this market as new."""
  isNew: Boolean

  """Lifecycle state."""
  status: BaseAppPredictionMarketStatus

  """
  True when this market has more than two outcomes (e.g. multi-candidate
  election vs binary Yes/No). Multi-outcome markets use NegRisk adapters
  and have different close semantics.
  """
  isMultiOutcomeMarket: Boolean

  """
  True when any outcome's normalized probability is >= 99%, indicating the
  market is effectively resolved even if not yet formally settled. Computed
  as `max(price_i / sum(all prices)) >= 0.99`.
  """
  isPriceResolved: Boolean

  """
  Event slug extracted from the upstream URL. For `/event/<slug>/...` or
  `/market/<slug>` patterns, returns segments[1]. Null when URL is missing
  or malformed.
  """
  eventSlug: String

  """
  Market slug extracted from the upstream URL. For `/market/<slug>` patterns,
  returns segments[1]. For `/event/<eventSlug>/<marketSlug>` patterns, returns
  segments[2]. Null when URL is missing or malformed.
  """
  marketSlug: String

  """
  Live order-book snapshot. Null when not requested or upstream unavailable.
  For binary markets, omit tokenId to default to the YES outcome token.
  For categorical markets, tokenId is required to identify the outcome.
  """
  orderBook(tokenId: ThirdPartyIdString): BaseAppPredictionMarketOrderBook

  """
  Price history series for a single outcome token. Null when not requested.
  For binary markets, omit tokenId to default to the YES outcome token.
  
  Deprecated: use `outcomesConnection { edges { node { priceCharts } } }`.
  """
  priceHistory(tokenId: ThirdPartyIdString, interval: BaseAppPredictionMarketPriceHistoryInterval!): [BaseAppPredictionMarketPriceBucket] @deprecated(reason: "Use outcome.priceCharts. Removed in INCEN-3803.")

  """
  Batch price history for multiple outcome tokens. Null when not requested.
  Intentional batch field (same pattern as other multi-item batch fields in
  this schema) designed to fetch N series in one RPC for the aggregated
  display price chart rather than N+1 per-outcome calls. Token identifiers
  not found are omitted from the response; order matches the request.
  
  Deprecated: use `outcomesConnection { edges { node { priceCharts } } }`.
  """
  priceHistories(tokenIds: [ThirdPartyIdString!]!, interval: BaseAppPredictionMarketPriceHistoryInterval!): [BaseAppPredictionMarketPriceHistorySeries] @deprecated(reason: "Use outcome.priceCharts. Removed in INCEN-3803.")
}

"""
Canonical high-level classification for a prediction market. Markets are
multi-membership by construction on upstream venues (Polymarket displays the
same market under every matching tag page), so consumers should iterate the
plural `BaseAppPredictionMarket.categories` field rather than assume a single
label. `UNSPECIFIED` is reserved for entries we could not classify into any
canonical value.
"""
enum BaseAppPredictionMarketCategory {
  UNSPECIFIED
  SPORTS
  POLITICS
  FINANCE
  CRYPTO
  GEOPOLITICS
  EARNINGS
  TECH
  CULTURE
  WORLD
  ECONOMY
  ELECTIONS
  MENTIONS
}

