"""
Context for an Asset Detail Page entry point.

Send the canonical `assetUuid` (used for owner-binding / audit and future
AMS resolution) plus the denormalized display fields the model and the
existing tools need today. `assetSymbol` is required because every
downstream client (asset_stats, rates, trade widgets, the get_asset_price
/ get_asset_stats tools) addresses assets by ticker, not by AMS UUID.

The optional `whatsHappeningSummary` and `priceSnapshot` let the model
reference exactly what the user just saw on the ADP without an extra tool
call. They are additive — the FE can ship `assetUuid + assetSymbol` first
and layer the rest in follow-ups.
"""
input AiAdvisorAssetDetailContextInput {
  """Canonical AMS UUID of the asset the user is viewing."""
  assetUuid: Uuid!

  """
  Ticker the model and downstream tools should use (e.g. `BTC`, `ETH`, `AAPL`). Required because tools/widgets address assets by symbol, not UUID.
  """
  assetSymbol: String!

  """
  Human-readable asset name (e.g. `Bitcoin`). Optional — lets the model address the user conversationally.
  """
  assetName: String

  """
  The 'what's happening now' summary text rendered on the ADP, verbatim.
  Plain text OR markdown — markdown links (`[label](https://...)`) are preserved
  through sanitization so the model can cite or follow them. Server-side
  sanitized (control chars stripped) and length-capped to 2000 chars.
  """
  whatsHappeningSummary: String

  """
  Snapshot of price / 24h change as shown on the ADP at the moment the user opened the chat. Lets the model reference numbers the user just saw.
  """
  priceSnapshot: AiAdvisorAssetPriceSnapshotInput
}

"""
Price snapshot the FE captures from the ADP chart. Carries an explicit
currency so the API does not need a breaking change for non-USD markets.
"""
input AiAdvisorAssetPriceSnapshotInput {
  """
  Spot price as shown on the page (e.g. {value: "65420.50", currency: "USD"}). `value` must be a non-negative decimal.
  """
  price: AmountInput!

  """
  Signed 24h percent change as a decimal string (e.g. `2.5` or `-1.8`). Unitless — no currency needed. Optional; sign is preserved.
  """
  change24hPercent: String
}

