  """Notional size available at this price level, as a USD decimal string."""
  size: String
}

"""
A single tradable outcome within a prediction-market event. Binary events
expose two outcomes (Yes / No); categorical events expose one outcome per
underlying market (e.g. each candidate in an election). Trade-path callers
read `conditionId` here — the parent `BaseAppPredictionMarket.eventId` is not
tradable.
"""
type BaseAppPredictionMarketOutcome {
  """Opaque GraphQL identifier for client cache normalization."""
  id: ID

  """Display label (e.g. 'Yes', 'No', 'Argentina')."""
  label: String

  """
  Tradable identifier for this outcome (Polymarket condition_id). Trade-path
  code reads this, never the parent event id.
  """
  conditionId: ThirdPartyIdString

  """
  Raw ERC-1155 outcome token id, the value clients pass as the `tokenId`
  argument to `orderBook` / `priceHistory` on the parent market. Distinct
  from `conditionId` — Polymarket's CLOB books and price-history series
  are keyed by token_id, while `conditionId` identifies the market the
  token belongs to. Currently always `null` until portfolio-service
  surfaces `token_id` on `PredictionMarketOutcome` (tracked as the ADP
  chart follow-up); schema lands now so the mobile ADP relay query can
  select it without a second schema bump.
  """
  tokenId: ThirdPartyIdString

  """Implied probability in [0, 1] as a decimal string."""
  price: String

  """
  Normalized probability as a whole percentage [0–100]. Computed as
  `round((100 * price) / sum(all sibling prices))` so that outcomes in a
  market always sum to ~100%. Null when prices are unavailable or total is
  zero.
  """
  probabilityPercent: Int

  """
  Rolling 24h notional volume for this outcome as a USD decimal string.
  Populated on ADP; may be nil on search / Hub cards.
  """
  volume24h: String

  """
  True when Polymarket has resolved/closed this outcome's underlying market
  (e.g. eliminated teams in a NegRisk multi-outcome event). Distinct from the
  parent `BaseAppPredictionMarket.status` lifecycle, which reflects the event
  as a whole.
  """
  isClosed: Boolean

  """
  All supported price-chart intervals bundled for this outcome token (15m, 1h,
  1d, 1w, max). Batched via dataloader — one upstream RPC per outcomesConnection
  page regardless of how many outcomes select it.
  """
  priceCharts: [BaseAppPredictionMarketPriceChart]
}

"""Server-side filter for outcome closed state in paginated queries."""
enum BaseAppPredictionMarketOutcomeClosedFilter {
  """No filter; return all outcomes."""
  UNSPECIFIED

  """Only open outcomes (isClosed=false)."""
  OPEN_ONLY

  """Only closed outcomes (isClosed=true)."""
  CLOSED_ONLY
}

"""
Relay-style connection over `BaseAppPredictionMarketOutcome`. Forward-only,
no `totalCount` (use `BaseAppPredictionMarket.totalOutcomes` instead).
"""
type BaseAppPredictionMarketOutcomeConnection {
  edges: [BaseAppPredictionMarketOutcomeEdge]
  pageInfo: PageInfo
}

"""
A single edge in a `BaseAppPredictionMarketOutcomeConnection`. `cursor`
is an opaque token derived from the outcome's position in the underlying
list and is meant to be passed back via `outcomesConnection(after:)` to
fetch the next page; `node` is the outcome itself.
"""
type BaseAppPredictionMarketOutcomeEdge {
  cursor: String
  node: BaseAppPredictionMarketOutcome
}

