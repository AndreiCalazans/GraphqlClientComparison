  True when Hyperliquid has marked this market as delisted on the venue. Markets
  flagged as delisted are still queryable for historical context but no longer
  accept new orders.
  """
  isDelisted: Boolean

  """
  Name of the HIP-3 dex this market belongs to (e.g. "xyz", "cash"). Null
  for markets on the main Hyperliquid perp dex.
  """
  dex: String

  """
  Hyperliquid lot-size precision for this market. Order and position sizes must be a multiple of 10^-sizeDecimals. Used by clients for coin-size truncation and price-tick normalization. Unrelated to any on-chain token decimals.
  """
  sizeDecimals: Int

  """
  Hyperliquid asset id to send as the `a` field in L1 order actions. For markets
  on the native perp dex this is the `meta.universe` index; for HIP-3 builder-dex
  markets it is the offset-encoded id (100000 + dexIndex*10000 + localIndex).
  This is the value clients must use when placing orders — distinct from
  `PerpsAsset.assetId`, which is a Coinbase catalog identifier.
  """
  universeIndex: Int
}

