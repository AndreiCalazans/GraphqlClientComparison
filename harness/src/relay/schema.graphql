type Sends {
  """
  Search for recipients by string identifier. Will return an error payload if some input parameters are invalid.
  """
  searchRecipient(recipient: String!, destinationTag: String, recipientType: SendsRecipientType): SendsSearchRecipientPayload

  """Preview and validate values for a send before creating one."""
  previewSendAmount(amountCrypto: AmountInput, fromAccountUuid: Uuid!, amountFiat: AmountInput, exchangeRateCacheKey: String): SendsPreviewedAmount

  """Estimate fee for a send before creating one."""
  sendFeeEstimate(fromAccountUuid: Uuid!, toAddress: String!, exchangeTo: [TickerSymbol], network: String, amountCrypto: AmountInput): SendFeeEstimate

  """
  Returns the list of supported networks for sending/receiving the given asset
  """
  supportedNetworks(assetUuid: Uuid!, action: SendReceiveSupportedNetworksAction!, applicationContext: SendReceiveSupportedNetworksApplicationContext!, address: String): SendReceiveSupportedNetworks

  """Returns the address type of the network"""
  addressType(assetSymbol: String, toAddress: String, network: String!, action: SendReceiveSupportedNetworksAction, applicationContext: SendReceiveSupportedNetworksApplicationContext): String @deprecated(reason: "Use addressTypeV2 instead.")

  """Returns the address type of the asset-address pair"""
  addressTypeV2(assetSymbol: String!, toAddress: String!, network: String, action: SendReceiveSupportedNetworksAction, applicationContext: SendReceiveSupportedNetworksApplicationContext): String

  """Returns a map of the address type and the network slug"""
  addressProperties(assetSymbol: String!, toAddress: String!, network: String, action: SendReceiveSupportedNetworksAction, applicationContext: SendReceiveSupportedNetworksApplicationContext): AddressProperties

  """Returns a list of gifting cards"""
  giftingCards: [GiftingCard] @deprecated

  """Returns a specific gifting card given the specific type to return"""
  giftingCardByType(type: GiftingCardType!): GiftingCard @deprecated

  """Returns the details of a recipient encoded in a URI string"""
  parseCryptoUri(uri: String!): SendsParsedCryptoUri

  """Returns accounts based on recipient input compatibility"""
  assetsWithAccountCompatibility(recipientInput: String): [AssetWithAccountCompatibility]
  assetsWithCompatibility(recipientInput: String!, recipientIsCBWallet: Boolean): [AssetWithCompatibility]

  """
  Returns assets with their network compatibilities filtered by specific asset symbols.
  This provides detailed information about which networks are compatible for sending
  each asset to the given recipient input, limited to the specified asset symbols.
  """
  assetsWithNetworkCompatibilitiesBySymbol(
    """
    The recipient input string (address, email, phone, etc.) to check compatibility against.
    This is used to determine which networks can be used to send to this recipient.
    """
    recipientInput: String!

    """
    List of asset symbols to filter the results by. Only assets with these symbols will be returned.
    """
    filteredAssetSymbols: [String!]!
  ): [AssetWithNetworkCompatibility]

  """
  Returns all sendable assets that are compatible with sending to the given recipient.
  Unlike assetsWithCompatibility, this returns the complete allowlist of sendable assets,
  not limited to assets the user owns.
  """
  allowlistAssetsWithCompatibility(
    """
    The recipient input string (address, email, phone, etc.) to check compatibility against.
    """
    recipientInput: String!
  ): [AllowlistAssetWithCompatibility]

  """Get P2P authenticated claim details using a claim token"""
  p2pClaimDetails(claimToken: String!): P2PSendClaimDetails
}

"""
Amount to send. Exactly one field must be set (enforced by @oneOf).
Fiat and crypto represent explicit amounts; maxBalance sends the entire
available balance for the source account.
"""
input SendsAmountInput {
  """Fiat currency amount (e.g. 25.00 USD)."""
  fiat: AmountInput

  """Crypto currency amount (e.g. 0.005 BTC)."""
  crypto: AmountInput

