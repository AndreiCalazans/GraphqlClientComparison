  """
  Returns the PaymentLinkPages owned by the current merchant, paginated.
  
  Relay-style pagination moves in one direction per query: pass
  `first`/`after` to page forward (the default, from the start), or
  `last`/`before` to page backward (for prev-page navigation). The two
  directions are mutually exclusive — pairing the forward cursor `after`
  with a backward argument (`last`/`before`) is rejected. `last` overrides
  `first`'s page size when paging backward.
  
  Optional filters: `statuses` narrows by one or more lifecycle states,
  `productId` restricts to pages backed by a specific MerchantProduct, and
  `createdAfter`/`createdBefore` bound results to a created-at range. The
  bounds are inclusive and either side may be omitted to leave it unbounded
  (PLM's TimeFilter reads `start_time`/`end_time` as "created at or after" /
  "created at or before"). `sortOrder` orders results by created-at
  independently of the pagination direction; when omitted it resolves to
  PLM's default, which is newest-first (created-at DESC).
  
  The singular `status` filter is retained for back-compat but deprecated:
  prefer `statuses`. When both are supplied, `statuses` takes precedence.
  An empty `statuses` list (`[]`) is treated the same as omitting it — it
  applies no multi-status filter and falls back to `status` if present,
  otherwise returns pages of every status.
  """
  paymentLinkPages(first: Int = 20, after: String, last: Int, before: String, status: PaymentLinkPageStatus @deprecated(reason: "Use statuses instead"), statuses: [PaymentLinkPageStatus!], productId: ThirdPartyIdString, createdAfter: Time, createdBefore: Time, sortOrder: PaymentLinkPageSortOrder): PaymentLinkPageConnection

