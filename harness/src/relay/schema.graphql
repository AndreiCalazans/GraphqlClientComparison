  List of EVM chain ids, assets from which should be included in the balance calculation.
  Clients might specify a list of chains that are supported by that particular app.
  E.g., if a client only supports Mainnet and Polygon, it does not want to see that the account also has funds on Optimism.
  If not specified, the balance will include all the funds on all known and supported networks.
  """
  chainIds: [Int!]

  """
  If true, the result will include assets on various supported testnets.
  Note: Assets on the testnets have no value but still might be
