"""The subscription root for real-time updates."""
type Subscription {
  """
  Stream events for a single assistant turn.
  Sends a new message and streams the assistant's response.
  """
  aiAdvisorChatStream(
    """Conversation in which the turn is occurring."""
    conversationUuid: Uuid!

    """Who is speaking (USER or SYSTEM) that initiated this turn."""
    role: AiAdvisorRole!

    """Text content of the user/system message that initiated this turn."""
    text: String

    """
    Tool results after user approval. Re-subscribe with this to continue conversation.
    """
    toolResults: [AiAdvisorToolResultInput!]

    """
    Optional context UUID for background context (e.g., news article context).
    """
    contextUuid: Uuid
  ): AiAdvisorChatEvent

  """
  Reconnect to an active background stream.
  Use this when hasActiveStream is true on the conversation to resume receiving events.
  Returns an error if no active stream exists.
  """
  aiAdvisorReconnectToStream(
    """Conversation to reconnect to."""
    conversationUuid: Uuid!
  ): AiAdvisorChatEvent

  """
  Streams real-time price updates for a resource identified by CBRN.
  
  cbrn is required at runtime; passing null returns an error.
  quoteCurrency accepts a 3-letter ISO code ("EUR") or fiat CBRN
  ("v1:fiat:::EUR:"); null or "USD" yields an unconverted USD stream.
  Malformed input is rejected before the upstream subscription is opened.
  
  The FX rate is sampled once at stream open and held fixed for the
  stream's lifetime — long-lived non-USD subscribers should reconnect
  periodically to pick up a fresh rate.
  """
  resourcePriceUpdates(cbrn: String, quoteCurrency: TickerSymbol): ResourcePriceUpdatesEvent

  """
  Placeholder field to create the Mutation type since we can't have a type with no fields
  """
  dummyBaseField: Boolean

  """A subscription for account delegation status updates"""
  baseAppAccountDelegationUpdated(input: BaseAppAccountDelegationUpdatedInput!): BaseAppAccountDelegationUpdatedEvent

  """
  Streams account sync status for a given user wallet address and network ID.
  """
  baseAppAccountSyncStatusUpdated(input: BaseAppAccountSyncStatusUpdatedInput!): BaseAppAccountSyncStatusUpdatedEvent

  """
  Stream events for a single agent turn.
  Sends the user message and streams the agent's response.
  Think of this as a "streaming mutation".
  """
  baseAppAgentChatStream(input: BaseAppAgentChatStreamInput!): BaseAppAgentChatStreamEvent

  """
  Reconnect to an active background stream.
  Use when the client navigated away and returns to a conversation
  that still has an active stream running on the server.
  Returns an error if no active stream exists.
  """
  baseAppAgentReconnectToStream(input: BaseAppAgentReconnectToStreamInput!): BaseAppAgentReconnectToStreamEvent

  """A subscription for Bitcoin transaction status updates"""
  baseAppBitcoinTransactionUpdated(input: BaseAppBitcoinTransactionUpdatedInput!): BaseAppBitcoinTransactionUpdatedEvent

  """A call prepared by the backend for a transaction has been updated"""
  baseAppIdentityChanged(input: BaseAppIdentityChangedInput): BaseAppIdentityUpdatedEvent

  """
  Live feed of newly observed token assets. Emits when a token creation or
  update event is published.
  """
  newTokens(input: NewTokensInput!): NewTokensEvent

  """
  Live updates for a single perpetuals market. Provide perpsCbrnId, or both
  venue and venueId.
  """
  baseAppPerpMarketUpdated(input: PerpMarketUpdatedInput!): BaseAppPerpMarketUpdatedEvent

  """
  Live updates for a client-specified set of perpetuals markets. Emits one
  event per market as its live snapshot changes. The set is NOT paginated — the
  client provides the exact visible window (e.g. the Hub scroll viewport).
  Capped server-side; oversized or empty sets are rejected with
  INVALID_ARGUMENT.
  """
  baseAppPerpMarketsUpdated(input: PerpMarketsUpdatedInput!): BaseAppPerpMarketsUpdatedEvent

  """A call prepared by the backend for a transaction has been updated"""
  baseAppPreparedCallParametersUpdated(input: BaseAppPreparedCallParametersUpdatedInput!): BaseAppPreparedCallParametersUpdatedEvent

  """
  A Solana call prepared by the backend for a transaction has been updated
  """
  baseAppSolanaPreparedCallParametersUpdated(input: BaseAppSolanaPreparedCallParametersUpdatedInput!): BaseAppSolanaPreparedCallParametersUpdatedEvent

  """A subscription for Solana transaction status updates"""
  baseAppSolanaTransactionUpdated(input: BaseAppSolanaTransactionUpdatedInput!): BaseAppSolanaTransactionUpdatedEvent

  """
  Subscribe to balance updates for specific tokens on an address.
  This includes fiat exchange rates updates and crypto balance updates.
  """
  baseAppFiatTokenBalancesUpdated(input: FiatTokenBalancesUpdatedInput!): FiatTokenBalancesUpdatedEvent @deprecated(reason: "Use baseAppFiatTokenBalancesUpdatedV2 instead.")

  """
  Subscribe to balance updates for specific tokens on the given account(s).
  Supports both EVM and Solana wallets via AccountUrn. This includes fiat exchange
  rates updates and crypto balance updates.
  """
  baseAppFiatTokenBalancesUpdatedV2(input: FiatTokenBalancesUpdatedV2Input!): FiatTokenBalancesUpdatedEvent

  """
  Subscribe to updates for all grouped token balances for an address.
  This includes new token ownerships, changes in token balances, and heartbeat events.
  """
  baseAppTokenOwnershipsUpdated(input: TokenBalanceUpdatedInput!): TokenOwnershipsUpdatedEvent @deprecated(reason: "Use baseAppTokenOwnershipsUpdatedV2 instead.")

  """
  Subscribe to updates for all grouped token balances for the given account(s).
  Supports both EVM and Solana wallets via AccountUrn. This includes new token ownerships,
  changes in token balances, and heartbeat events.
  """
  baseAppTokenOwnershipsUpdatedV2(input: TokenOwnershipsUpdatedV2Input!): TokenOwnershipsUpdatedEvent

  """Subscribe to price chart updates for specific tokens"""
  baseAppPriceChartUpdated(input: PriceChartUpdatedInput!): PriceChartUpdatedEvent

  """Subscribe to the exchange rate between two tokens."""
  baseAppTokenToTokenRate(input: TokenToTokenRateSubscriptionInput!): TokenToTokenRateEvent

  """Subscribe to the exchange rate between a token and a fiat currency."""
  baseAppTokenToFiatRate(input: TokenToFiatRateSubscriptionInput!): TokenToFiatRateEvent

  """
  Subscribe to fiat balances updates when the exchange rate moves.
  Returns either balance updates or heartbeat events.
  """
  baseAppTotalFiatBalanceUpdated(input: TotalFiatBalanceUpdatedInput!): TotalFiatBalanceUpdatedEvent @deprecated(reason: "Use baseAppTotalFiatBalanceUpdatedV2 instead.")

  """
  Subscribe to fiat balances updates when the exchange rate moves.
  Supports both EVM and Solana wallets via AccountUrn.
  Returns either balance updates or heartbeat events.
  """
  baseAppTotalFiatBalanceUpdatedV2(input: TotalFiatBalanceUpdatedV2Input!): TotalFiatBalanceUpdatedEvent

  """A subscription for transaction status updates"""
  baseAppTransactionUpdated(input: BaseAppTransactionUpdatedInput!): BaseAppTransactionUpdatedEvent

  """The application updates"""
  creditCardApplicationUpdates(input: CreditCardApplicationUpdateInput!): CreditCardApplicationUpdateResponse

  """
  Placeholder type so we can create an empty Subscription type that can be extended from
  """
  dummyGrowthGraphql: Boolean

  """Returns client marketing tracking events in 'new' status"""
  newClientMarketingTrackingEvents(trackingType: MarketingTrackingClientTrackingMethodInput, vendorPlatform: MarketingTrackingClientVendorPlatformInput): [ClientMarketingTrackingEvent]

  """Subscribes to updates for the latest price of a specific asset."""
  latestAssetPriceUpdated(input: LatestAssetPriceUpdatedInput!): LatestAssetPriceUpdatedEvent

  """Subscribes to updates for the latest prices of multiple assets."""
  latestAssetPricesUpdated(input: [LatestAssetPriceUpdatedInput!]!): LatestAssetPriceUpdatedEvent

  """
  Subscribes to updates for the latest price chart data of a specific asset.
  """
  latestAssetPriceChartUpdated(input: LatestAssetPriceChartUpdatedInput!): LatestAssetPriceChartUpdatedEvent

  """
  Placeholder type so we can create an empty Subscription type that can be extended from
  """
  dummy: Boolean

  """
  Real time updates for account history entries.
  Streams created, updated, and deleted account history entries based on the provided filter.
  """
  accountHistoryEvents(filter: AccountHistoryEventsInput): AccountHistoryEvent

  """
  Real-time updates for a specific asset. Initially delivers price data at ~1s intervals.
  Only fields with available updates are populated; the rest are null.
  """
  assetUpdates(cbrn: String, quoteCurrency: TickerSymbol): AssetUpdateEvent

  """Subscribe conversation to receive events realtime."""
  subscribeConversationEvents: ConversationEventEdge

  """TODO: Please add a description for this field!"""
  subscribeConversationEventsByConversation(input: SubscribeEventsByConversationInput!): ConversationEventEdge

  """Subscription for messages of unAuthenticated conversation"""
  subscribeUnauthenticatedConversationEventsByConversation(input: SubscribeEventsByConversationInput!): ConversationEventEdge

  """
  Returns a subscription that emits events when a futures position and metadata and futuresPnL derived from them are updated.
  The return value is a FuturesPositionsEvent, which is a union of all possible update events, from metadata updating, futurePnL updating,
  to futures position updates, additions and removals.
  For FuturesPositionAddedEvent/FuturesPositionRemovedEvent, clients should use Relay declarative directives to modify a connection
  """
  futuresPositionsUpdate: FuturesPositionsEvent

  """
  Returns a subscription that emits events when an FCM position is updated.
  If optional input productIds is provided, only positions for the given productIds will be emitted. If not provided, all positions will be emitted.
  The return value is a FcmPositionsEvent, which is a union of all possible update events:
  FCM position updates, additions and removals.
  For FcmPositionAddedEvent/FcmPositionRemovedEvent, clients should use Relay declarative directives to modify a connection
  DO NOT USE UNTIL IT IS READY
  """
  fcmPositionsUpdate(productIds: [ThirdPartyIdString!]): FcmPositionsEvent

  """
  Returns a subscription that emits events when an FCM position's open Tpsl orders are updated.
  The return value is a FcmPositionsOpenTpslOrdersEvent, which is a union of all possible update events:
  FCM position's open Tpsl orders updates, additions and removals.
  For FcmPositionOpenTpslOrdersAddedEvent/FcmPositionOpenTpslOrdersRemovedEvent, clients should use Relay declarative directives to modify a connection
  DO NOT USE UNTIL IT IS READY
  """
  fcmPositionsOpenTpslOrdersUpdate(productId: ThirdPartyIdString): FcmPositionsOpenTpslOrdersEvent

  """
  Returns a subscription that emits events when an FCM position's predicted liquidation prices are updated.
  DO NOT USE UNTIL IT IS READY
  """
  fcmPositionsPredictedLiquidationPricesUpdate(productId: ThirdPartyIdString): FcmPositionsPredictedLiquidationPricesUpdatedEvent

  """
  Returns a subscription that emits events when an FCM position's funding pnl is updated.
  DO NOT USE UNTIL IT IS READY
  """
  fcmPositionsFundingPnlUpdate(productId: ThirdPartyIdString): FcmPositionsFundingPnlUpdatedEvent

  """
  Returns a subscription that emits events when user's total futures pnl is updated.
  DO NOT USE UNTIL IT IS READY
  """
  fcmFuturesPnLUpdate: FcmFuturesPnLUpdatedEvent

  """
  Returns a subscription that emits events when the metadata around whether a user's FCM positions are stale is updated.
  DO NOT USE UNTIL IT IS READY
  """
  fcmPositionsStaleMetadataUpdate: FcmPositionsStaleMetadataUpdatedEvent

  """
  Subscribe to receive real-time open perpetual future positions and portfolio summary data
  
  Positions are sorted in descending order by notional value.
  If productId is provided, the position entry with the matching productId will be sorted to the top of the list.
  """
  perpetualFuturePositionsUpdatedV2(input: PerpetualFuturePositionsUpdatedV2Input): PortfolioPerpetualFuturesMessage

  """
  Subscribe to receive real-time updates for a single open perpetual future position
  Note: this is used by simple to hydrate ADP
  """
  perpetualFuturePositionUpdated(productId: ThirdPartyIdString!): PortfolioPerpFuturesPositionMessage

  """
  Stream Balance History period updates. Each event completes exactly one
  entire timeseries chart update (hour/day/week) (1 min, 5 min, 30 min). Initialization is
  unary via userBalanceChart; subscription sends only deltas.
  """
  portfolioLiveBalanceChart(input: PortfolioLiveBalanceChartInput!): PortfolioLiveBalanceChart

  """
  Returns a subscription that emits events when brokerage orders placed through Simple Trade interface are updated.
  Currently supports CEX(Simple Limit Order), FUTURE(Simple Derivs), EQUITY product types.
  TODO: Add PREDICTION_MARKET product type support once it has Limit Order support.
  
  The return value is a SimpleBrokerageOrdersUpdatedEvent, which is a union of all possible update events:
  - SimpleBrokerageOrdersSnapshotEvent: Complete snapshot of all matching orders (sent on connect/reconnect as self-healing mechanism)
  - SimpleBrokerageOrdersAddedEvent: New order created
  - SimpleBrokerageOrdersPartiallyFilledEvent: Order fill percentage changed
  - SimpleBrokerageOrdersFilledEvent: (deprecated, never emitted — use SimpleBrokerageOrdersRemovedEvent)
  - SimpleBrokerageOrdersCancelledEvent: Order cancelled
  - SimpleBrokerageOrdersExpiredEvent: (deprecated, never emitted — use SimpleBrokerageOrdersRemovedEvent)
  - SimpleBrokerageOrdersRemovedEvent: Order removed from open list (terminal state: filled, cancelled, or expired)
  """
  simpleBrokerageOrdersUpdated(productId: ThirdPartyIdString, status: BrokerageOrderExecutionStatus, productType: BrokerageProductType, orderPlacementSource: String, categories: [AccountHistoryEntryCategory!], baseCbrns: [String!]): SimpleBrokerageOrdersUpdatedEvent

  """Subscribe conversation to receive events realtime."""
  subscribeP2PConversationEventsByConversation(input: P2PSubscribeEventsByConversationInput!): P2PChatConversationEventEdge

  """
  Subscribe to real-time performance updates for one or more assets.
  Returns the same Performance and ResourcePerformance types as ViewerAsset.performance
  and ViewerAsset.performanceV2, enabling Apollo cache normalization via shared IDs.
  """
  performanceUpdated(cbrns: [String!]!, timeRanges: [TimeRange!]! = [ALL_TIME], productType: PerformanceProductType = PRODUCT_TYPE_UNSPECIFIED): [PerformanceUpdatedMessage]

  """Subscribe to receive real-time asset balances"""
  assetBalances(input: AssetBalancesSubscriptionInput!): AssetBalancesMessage

  """Subscribe to receive real-time total portfolio balance"""
  totalPortfolioBalance(input: TotalPortfolioBalanceSubscriptionInput): TotalPortfolioBalanceMessage

  """Subscribe to receive real-time portfolio balances"""
  portfolioBalanceUpdated(currency: String): PortfolioUpdateMessage

  """
  Subscribe to receive real-time portfolio balances.
  Differs from portfolioBalanceUpdated in that it will not return Perpetuals portfolios. Instead, perpetual balances are aggregated into the default portfolio.
  DO NOT USE, still in development as part of UTP
  """
  portfolioBalanceUpdatedV2(currency: String): PortfolioUpdateMessage

  """
  Returns a subscription that emits events when the user's total prediction markets PnL is updated.
  This includes changes from:
  - Position price movements (unrealized PnL)
  - Position opens/closes (realized PnL)
  - Settlement events
  """
  predictionMarketsPnLUpdate: PredictionMarketsPnLUpdatedEvent

  """
  Returns a subscription that emits events when a prediction market position is updated.
  The return value is a PredictionMarketPositionEvent, which is a union of all possible update events:
  position additions, updates, and removals.
  For PredictionMarketPositionAddedEvent/PredictionMarketPositionRemovedEvent, clients should use Relay declarative directives to modify a connection.
  """
  predictionMarketsPositionsUpdate(
    """
    Optional CBRN to filter positions.
    - If isEvent is false or not provided: treats as a Market CBRN and returns only position updates matching this CBRN
    - If isEvent is true: treats as an event CBRN and returns position updates for all markets under that event
    If not provided, returns updates for all positions.
    """
    productCbrn: String

    """
    Indicates whether the productCbrn is an event CBRN (true) or a market/product CBRN (false/not provided).
    Defaults to false.
    """
    isEvent: Boolean

    """
    Optional quote CBRN for currency conversions on Amount fields.
    If not provided, amounts will be in the position's native currency.
    """
    quoteCbrn: String
  ): PredictionMarketPositionEvent

  """TODO: Please add a description for this field!"""
  primePortfolioWalletsBalances(input: PrimePortfolioWalletsBalancesSubscriptionInput!): PrimePortfolioWalletsBalancesSubscriptionMessage

  """
  Retail brokerage product intended to be used with `Subscription.product`
  """
  spotProductStatsEvent(productId: String!): SpotProductStatsEvent

  """TODO: Please add a description for this field!"""
  retailBrokerageProductStatsByIdsV2(input: RetailBrokerageProductStatsByIdsV2Input!): RetailBrokerageSubscriptionMessage

  """TODO: Please add a description for this field!"""
  retailBrokerageProducts(input: RetailBrokerageProductsSubscriptionInput!): [RetailBrokerageProductsSubscriptionMessage]

  """Retrieves auction data for a given product ID"""
  auctionChanged(productId: ThirdPartyIdString!): AuctionChangedMessage

  """Retrieves depth data for a given product ID"""
  depthChanged(input: RetailBrokerageDepthChangedInput!): DepthChangedMessage

  """Real time updates for FCM Futures balance data and liquidation buffer"""
  futuresBalanceDataUpdated: RetailBrokerageFuturesBalanceDataUpdatedMessage

  """
  Real time updates for FCM Futures margin window changes. Used mainly for intraday
  """
  futuresCurrentMarginWindowUpdated(input: FuturesCurrentMarginWindowInput): FuturesCurrentMarginWindowUpdatedMessage

  """Real time updates for INTX Perps liquidation buffer information"""
  intxLiquidationBuffersUpdated: IntxLiquidationBuffersUpdatedMessage

  """Real time updates for INTX overdraft details"""
  overdraftDetails: OverdraftDetailsMessage

  """
  Start an agentic chat session and stream events (tokens, messages) as the agent generates them.
  """
  startRiskAgenticChatSessionStream(input: StartRiskAgenticChatSessionStreamInput!): RiskAgenticChatStreamEvent

  """
  Continue an agentic chat session with user input and stream events as the agent generates them.
  """
  continueRiskAgenticChatSessionStream(input: ContinueRiskAgenticChatSessionStreamInput!): RiskAgenticChatStreamEvent

  """
  Subscribe to real-time trade status updates for Simple Trade market orders.
  Replaces client-side polling after trade commit.
  
  Emits a TradeStatusEvent whenever the trade status changes (typically 2-3 updates per trade).
  Stream automatically closes when a terminal status is reached (COMPLETED / CANCELED)
  or after timeout (default: 5 minutes).
  
  Supports:
  - CEX spot trades: buy, sell, convert
  - DEX trades: buy, sell, convert
  
  Out of scope:
  - Limit orders, recurring orders, brokerage orders
  - Futures, equities, prediction markets
  """
  tradeStatusUpdated(tradeUuid: Uuid!): TradeStatusEvent

  """
  Returns a subscription that emits events when a spot position and balances derived from them are updated.
  The return value is a SpotPositionEvent, which is a union of all possible update events, from balance headers updating,
  to spot position updates, additions and removals.
  For SpotPositionAddedEvent/SpotPositionRemovedEvent, clients should use Relay declarative directives to modify a connection
  """
  spotPositionAndBalanceEvents(
    """optional filter by asset symbol"""
    assetSymbol: String

    """
    optional return balances in given currency. If not provided, takes user native currency
    """
    currency: String

    """optional return cash_eq|fiat|crypto|non cash only balances"""
    cashFilter: CashFilter

    """optional filter by underlying CBRN (e.g. for equity options)"""
    underlyingCbrn: String

    """
    optional filter by portfolio - if no UUID is provided it returns updates for all portfolios rolled up into one user-level portfolio
    """
    portfolioUuid: Uuid

    """
    optional list of account types - any accounts matching a type in this list will roll up into their own line item
    """
    delineatedAccountTypes: [AccountType!]
  ): SpotPositionAndBalanceEvent

  """
  Same as spotPositionAndBalanceEvents but will not return positions from the INTX portfolio.
  DO NOT USE, still in development as part of UTP
  """
  spotPositionAndBalanceEventsV2(
    """optional filter by asset symbol"""
    assetSymbol: String

    """
    optional return balances in given currency. If not provided, takes user native currency
    """
    currency: String

    """optional return cash_eq|fiat|crypto|non cash only balances"""
    cashFilter: CashFilter

    """optional filter by underlying CBRN (e.g. for equity options)"""
    underlyingCbrn: String

    """
    optional filter by portfolio - if no UUID is provided it returns updates for all portfolios rolled up into one user-level portfolio
    """
    portfolioUuid: Uuid

    """
    optional list of account types - any accounts matching a type in this list will roll up into their own line item
    """
    delineatedAccountTypes: [AccountType!]
  ): SpotPositionAndBalanceEvent

  """
  Subscribe to real-time trending asset list diff updates.
  Streams additions, removals, and rank changes for assets on a trending list.
  """
  trendingAssetsListDiffs(input: TrendingAssetsListDiffsInput!): TrendingAssetsListDiffMessage

  """
  Subscribe to real-time leaderboard updates from Search Service V2.
  Emits an initial snapshot event on connection followed by incremental
  diff batch events. Each diff in a `LeaderboardDiffsEvent` includes the
  full affected entity for both INSERT and DELETE operations so the
  frontend can correctly determine which entity to add to or remove from
  its local store.
  """
  leaderboardUpdated(
    """The leaderboard category to subscribe to"""
    listType: LeaderboardList!

    """Time frame for the leaderboard"""
    timeFrame: LeaderboardTimeFrame

    """Networks to filter by"""
    networks: [LeaderboardNetwork!]

    """Simple content filters"""
    simpleFilters: [LeaderboardSimpleFilter!]

    """Tradability filters"""
    tradabilityFilters: [LeaderboardTradabilityFilter!]

    """Range-based filters"""
    rangeFilters: [LeaderboardRangeFilterInput!]

    """Maximum number of assets in the snapshot"""
    size: Int! = 20
  ): LeaderboardUpdatedEvent

  """
  Subscribe to real-time user-level (aggregated) performance updates.
  Returns the same UserPerformance type as Viewer.performanceV2, enabling
  Apollo cache normalization via shared IDs between unary and subscription results.
  """
  userPerformanceUpdated(timeRanges: [TimeRange!]! = [ALL_TIME], productType: PerformanceProductType = PRODUCT_TYPE_COMPOSITE_CRYPTO): [UserPerformanceUpdatedMessage]

  """
  Returns a subscription on a transaction with given uuid.
  Subscriptions for transaction objects are useful for building UIs that monitor/display transactions that are in flight at the moment.
  Note that after a transaction progresses to “Confirmed” state, it becomes immutable hence it will not change.
  """
  defiTransactionChanged(input: DefiTransactionChangedInput!): DefiTransactionChangedMessage

  """
  Returns a subscription on position group health with given uuid and wallet Address
  Subscriptions for position group health objects are useful for building UIs that monitor health of position groups
  This subscription would be used on the Defi Borrow loan management screeen to display user's loan health
  """
  defiBorrowPositionGroupHealthChanged(input: DefiBorrowPositionGroupHealthChangedInput!): DefiBorrowPositionGroupHealthChangedMessage

  """Subscribes to a magic transaction progress."""
  onMagicProtocolChanged(input: OnMagicProtocolChangedInput!): OnMagicProtocolUpdate

  """
  Subscribe to updates for a specific ejection
  Streams the updated Ejection whenever EjectionRecord changes
  Frontend uses ejection.nextAction to determine what to show
  """
  onEjectionUpdated(ejectionId: ThirdPartyIdString!): Ejection

  """Subscribes to a MagicWallet transaction status."""
  onMagicWalletTransactionStatusChanged(input: MagicWalletTransactionStatusInput!): MagicWalletTransactionStatusUpdate

  """Real time updates for Order History"""
  monoAdvancedRetailOrdersUpdated(selectedProductId: ThirdPartyIdString, selectedStatus: BrokerageOrderExecutionStatus, productType: BrokerageProductType, isExpiryPerpetual: Boolean): MonoAdvancedRetailOrdersUpdatedEvent

  """
  Placeholder type so we can create an empty Subscription type that can be extended from
  """
  dummyRat: Boolean

