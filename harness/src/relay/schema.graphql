type ConvertInPlaceError implements ActionableErrorBase & ErrorV2 {
  """From ActionableErrorBase"""
  correlationId: ThirdPartyIdString!

  """
  Machine-readable failure class. Stable contract; FE should branch on
  this rather than on `description` (which is unlocalised English). The
  resolver always populates this for any Error variant it returns; the
  field is nullable only because the subgraph no-non-null-assertion
  rule forbids `!` on object-type fields.
  """
  reason: ConvertInPlaceErrorReason

  """Readable, localised and consumer (app user) friendly error title"""
  title: String

  """Best-effort English fallback for log/debug. FE should prefer `reason`."""
  description: String

  """
  From ActionableErrorBase. Always null today — populate when product provides per-reason CTAs.
  """
  cta: Cta
}

"""
Machine-readable classification of a convert-in-place failure. The FE
branches on `reason` to render its own localised copy; `description` is
a best-effort English fallback for log/debug surfaces.
"""
enum ConvertInPlaceErrorReason {
  """Caller failed auth (missing/insufficient CAT, or BFF↔rcc scope drift)."""
  UNAUTHORIZED

  """
  No Conversion exists for the caller — data-integrity smell (the FE
  shouldn't have rendered this surface) or a race where the record was
  deleted between FE open and the mutation call.
  """
  NOT_FOUND

  """
  Conversion exists but the underlying workflow is closed/missing — FE
  should re-read and re-render (likely a terminal-state user who is no
  longer driveable by signal).
  """
  INVALID_STATE

  """Backend error reaching rcc. Transient; retry safe."""
  UPSTREAM_ERROR
}

union ConvertInPlacePayload = ConvertInPlaceSuccess | ConvertInPlaceError

