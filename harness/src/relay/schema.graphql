"""
Live pricing and funding snapshot for a perpetuals market. All monetary and
percent fields are decimal strings to preserve precision. Monetary fields
(`change24hAbs`, `volume24h`, `openInterest`) are denominated in the fiat
currency specified by the enclosing query's `fiatCurrencyCode` argument
(defaults to USD). Percent and price fields are venue-native and not
fiat-converted.
"""
type PerpsMarketLiveSnapshot {
  """Current mark price as a decimal string. e.g. "65432.10"."""
  markPrice: String

  """
  Current oracle price as a decimal string. e.g. "65432.10". CEXs call this the
  index price; DEXs call it the oracle price.
  """
  oraclePrice: String

  """
  Order-book mid price as a decimal string. e.g. "65432.25". Null when the venue
  exposes no order book.
  """
  midPrice: String

  """
  Absolute price change over the trailing 24 hours, as a decimal string.
  Denominated in the fiat currency specified by `fiatCurrencyCode` (defaults to
  USD). Null for freshly listed markets without a prior-day snapshot.
  """
  change24hAbs: String

  """
  Percent price change over the trailing 24 hours, as a decimal string in
  fractional form. e.g. "0.0125" (= 1.25%). Null for freshly listed markets
  without a prior-day snapshot.
  """
  change24hPct: String

  """
  Total notional volume over the trailing 24 hours, as a decimal string.
  Denominated in the fiat currency specified by `fiatCurrencyCode` (defaults to
  USD).
  """
  volume24h: String

  """
  Total open interest, as a decimal string. Derived as `openInterestBase *
  markPrice`, then fiat-converted via `fiatCurrencyCode` (defaults to USD).
  """
  openInterest: String

  """
  Current funding rate, as a decimal string in fractional form. e.g. "0.0001"
  (= 0.01%). Venue-native; not fiat-converted.
  """
  fundingRate: String

  """Upstream timestamp of when this snapshot was produced."""
  dataAsOf: Time
}

"""Filter input for the perpsMarkets list query."""
input PerpsMarketsFilterInput {
  """Restrict results to a specific venue."""
  venue: PerpsVenue

  """
  Restrict results to a specific set of perps-market CBRNs (batch hydration shortcut).
  
  When non-empty, each entry must be a valid CBRN; invalid CBRNs surface as
  InvalidArgument from the upstream service. Can be combined with `venue`,
  `search`, and `statuses`.
  """
  marketIds: [ThirdPartyIdString!]

  """Free-text search string (matched against symbol / asset metadata)."""
  search: String

  """Restrict results to markets in any of the given statuses."""
  statuses: [PerpsMarketStatus!]

  """
  Restrict results to markets carrying any of the given tags. When empty or
  omitted, no tag filter is applied. Matching is "any of" — a market is
  included when it carries at least one of the supplied tags.
  Passing `UNSPECIFIED` is rejected with an `INVALID_ARGUMENT` error.
  """
  tags: [PerpsMarketTag!]
}

