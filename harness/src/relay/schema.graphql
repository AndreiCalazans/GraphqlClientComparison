"""
CoinbaseAnalytics provides blockchain analytics capabilities for investigating
addresses, wallets, transactions, and risk scores.
"""
type CoinbaseAnalytics {
  """
  This endpoint only supports paging, so the [first] parameter is ignored
  """
  blocksBySymbol(tickerSymbol: TickerSymbol!, after: String!, first: Int! = 10): CoinbaseAnalyticsBlockConnection

  """Get a block by its hash and ticker symbol"""
  blockByHashAndSymbol(hash: String!, tickerSymbol: TickerSymbol!): CoinbaseAnalyticsBlock

  """Get a block by its height and ticker symbol"""
  blockByHeightAndSymbol(height: String!, tickerSymbol: TickerSymbol!): CoinbaseAnalyticsBlock

  """Get transactions for a given ticker symbol with pagination"""
  transactionsBySymbol(tickerSymbol: TickerSymbol!, after: String!, first: Int! = 10): CoinbaseAnalyticsTransactionConnection

  """Get a transaction by its hash and ticker symbol"""
  transactionByHashAndSymbol(hash: String!, tickerSymbol: TickerSymbol!): CoinbaseAnalyticsTransaction

  """Get exposure information for an address"""
  exposure(hash: String!, tickerSymbol: TickerSymbol!, type: String!, direction: String!, hops: String, threshold: Float): CoinbaseAnalyticsExposure

  """Get an address by its hash and ticker symbol"""
  addressByHashAndSymbol(hash: String!, tickerSymbol: TickerSymbol!): CoinbaseAnalyticsAddress

  """Get a wallet by its hash and ticker symbol"""
  walletByHashAndSymbol(hash: String!, tickerSymbol: TickerSymbol!): CoinbaseAnalyticsWallet

  """Get time pattern data for an address"""
  timePatternByHashAndSymbol(hash: String!, tickerSymbol: TickerSymbol!, type: String!, isActivity: Boolean): CoinbaseAnalyticsTimePattern

  """Get wallets for a given ticker symbol with pagination"""
  walletsBySymbol(tickerSymbol: TickerSymbol!, after: String!, first: Int! = 10): CoinbaseAnalyticsWalletConnection

  """Get graphs for the current user"""
  graphsForUser(tickerSymbol: TickerSymbol, after: String!, first: Int! = 10): CoinbaseAnalyticsGraphConnection

  """Search for addresses and names with autocomplete"""
  autocompleteSearch(query: String!, tickerSymbol: TickerSymbol!): CoinbaseAnalyticsAutocompleteSearch

  """Search across multiple chains"""
  multichainSearch(query: String!): CoinbaseAnalyticsMultichainSearch

  """Get interactions for an entity"""
  interactions(entity: CoinbaseAnalyticsInteractionsEntities!, uuid: Uuid!, tickerSymbol: TickerSymbol!): CoinbaseAnalyticsInteractions

  """Search for addresses or wallets with pagination"""
  searchResults(query: String!, entity: CoinbaseAnalyticsSearchType!, tickerSymbol: TickerSymbol!, after: String!, first: Int! = 10): CoinbaseAnalyticsSearchResultsConnection

  """Get valid chains for a search query"""
  searchValidChains(query: String!): CoinbaseAnalyticsSearchValidChains
}

