  """Error code indicating what went wrong during the claim step."""
  code: ClaimAirdropErrorCode

  """Human-readable error message."""
  message: String
}

"""Error codes for the claimAirdrop mutation."""
enum ClaimAirdropErrorCode {
  """The slug provided is invalid or empty."""
  INVALID_SLUG

  """No airdrop exists for the provided slug."""
  AIRDROP_NOT_FOUND

  """
  The user is not eligible for this airdrop, or has already advanced past
  the OPTED_IN state (e.g. FUNDING_IN_PROGRESS, FUNDED, COMPLETED, FAILED).
  """
  ALREADY_CLAIMED

  """
  The airdrop campaign is not currently active (e.g. still in DRAFT or PENDING_APPROVAL).
  """
  AIRDROP_INACTIVE

  """
  The user's identity could not be resolved. The request should be retried
  after re-authenticating.
  """
  UNAUTHENTICATED

  """An unexpected backend error occurred during the claim step."""
  INTERNAL_ERROR
}

"""Input for claiming an airdrop."""
input ClaimAirdropInput {
  """Slug identifying the airdrop campaign."""
  slug: String!
}

"""Payload returned from the claimAirdrop mutation."""
union ClaimAirdropPayload = ClaimAirdropSuccess | ClaimAirdropError

"""
Success response from claimAirdrop. Funding still progresses asynchronously
after this response is returned; clients should poll user airdrop status
separately to observe FUNDING_IN_PROGRESS / FUNDED / ORDER_IN_PROGRESS /
COMPLETED transitions.
"""
