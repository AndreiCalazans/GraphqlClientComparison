"""DefiBorrowClient"""
enum DefiBorrowClient {
  RETAIL_MOBILE
  RETAIL_WEB
}

"""A collateral funding source available for a market."""
type DefiBorrowCollateralSource {
  """The source asset (e.g. SOL for staked, jitoSOL for primary)."""
  sourceAsset: ViewerAsset

  """Variant type identifier."""
  variant: DefiBorrowCryptoSourceVariant

  """Whether a transformation step (e.g. wrap) is needed before supply."""
  hasTransformation: Boolean

  """
  Per-source new-loan borrow capacity - the max the user could borrow by opening a new loan and supplying their full available balance of THIS source as collateral. Returns 0 when the user has no balance of the source asset (FE may hide the row in that case). Null for unauthenticated callers, on backend failure, or for synthetic fallback rows when the backend returns no eligible sources. Distinct from DefiBorrowMarket.borrowPower (which adds the increase-debt component against an existing loan).
  """
  borrowPower: DefiBorrowAmount

  """
  User's active loans backed by this collateral source. Empty list when the
  source has no active loans, or when the source originates from the
  per-market path (DefiBorrowMarket.collateralSources) which does not populate
  active loan UUIDs.
  """
  activeLoans: [DefiBorrowLoan!]!
}

