  """
  True when the market uses the Neg-Risk (multi-outcome mutually-exclusive) adapter. Required for selecting the correct Polymarket operator and exchange contract in redeem/sell flows — Neg-Risk markets route through NEG_RISK_CTF_EXCHANGE/NEG_RISK_ADAPTER; standard binary markets route through CTF_EXCHANGE/CTF_COLLATERAL_ADAPTER.
  """
  isNegRisk: Boolean

  """
  True when the parent market has resolved and the viewer can claim winnings.
  """
  isClaimable: Boolean

  """
  Amount claimable once `isClaimable` is true; USD decimal string. Empty when not claimable.
