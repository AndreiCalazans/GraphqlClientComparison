"""
BankingCard interface representing common properties across all card types.
Cards are spending instruments that reference their parent account.
Product differentiation is determined by the CardOffering field.
"""
interface BankingCard {
  """Relay identifier"""
  id: ID

  """Universal unique identifier (Coinbase-owned)"""
  uuid: Uuid

  """Card offering determines the product type"""
  offering: CardOffering

  """Card status"""
  status: BankingCardStatus

  """Physical or virtual card"""
  cardType: BankingCardCategory

  """Cardholder name as it appears on the card"""
  nameOnCard: String

  """Last 4 digits of card number"""
  last4: String

  """Card expiration timestamp"""
  expiresAt: Time

  """Card network (Visa, Mastercard, etc.)"""
  network: String

  """When the card was created"""
  createdAt: Time

  """When the card was last updated"""
  updatedAt: Time

  """When the card status was last changed"""
  currentStatusAt: Time

  """Current user action status for this card"""
  userActionStatus: UserActionStatus

  """Shipping information for physical cards"""
  shippingInfo: BankingCardShippingInfo

  """Reference to parent account"""
  account: BankingAccount

  """
  Issuer-specific card identifier (Cardless UUID for credit, Marqeta token for debit)
  """
  issuerCardId: ThirdPartyIdString

  """
  Whether the user has completed 2FA to view this card's sensitive details (PAN, CVV).
  Always true for physical cards. For virtual cards, indicates if 2FA has been completed.
  Returns false if the authorization status is unknown or missing.
  """
  isCardViewAuthorized: Boolean

  """
  Secure token for viewing full card details (PAN, CVV, etc.).
  Requires 2FA authentication for virtual cards based on feature flags and app version.
  """
  cardViewToken(
    """Optional access token for additional authorization"""
    accessToken: String

    """Optional 2FA proof token for virtual card access"""
    proofToken: String

    """
    Optional 2FA action string identifying the user action that initiated the 2FA challenge.
    Used by the backend to verify the proof token was minted for the correct action.
    Example values: "web-retail-cardDetails", "mobile-retail-creditCardDetails", "mobile-retail-cardDetails".
    """
    action: String
  ): CardViewTokenResponse

  """
  Secure token for viewing full card details (PAN, CVV, etc.) with mandatory 2FA verification.
  This field enforces 2FA on every call and is intended for web clients that require
  stricter authentication on every card view. Mobile clients should continue using
  `cardViewToken` with `isCardViewAuthorized` for their 2FA flow.
  """
  webCardViewToken(
    """Required 2FA proof token obtained from a completed 2FA challenge."""
    proofToken: String!

    """
    Required 2FA action string identifying the user action that initiated the 2FA challenge.
    Used by the backend to verify the proof token was minted for the correct action.
    Example value: "web-retail-cardDetails".
    """
    action: String!
  ): CardViewTokenResponse
}

