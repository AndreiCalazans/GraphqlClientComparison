  """The time the loan was closed at. Null if the loan is still open."""
  closedAt: Time

  """Rate type of the loan."""
  loanType: DefiBorrowLoanKind!

  """
  Protocol-specific loan details (proto oneof). Set only for fixed-rate loans;
  null for variable-rate.
  """
  protocolSpecific: DefiBorrowLoanProtocolSpecific

  """Transactions associated with the loan."""
  transactions: [DefiBorrowTransaction]

  """
  User-level liquidation protection config for this loan.
  Contains per-protection-type configurations and pending action status.
  """
  liquidationProtectionConfig: DefiBorrowLiquidationProtectionLoanConfig

