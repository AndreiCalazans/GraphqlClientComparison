"""
CardReplacementEligibility tells the client whether the user can request
a card replacement right now. The backend evaluates the same gates the
ReplaceCard mutation enforces (killswitch / card status / replacement
cool-down / rolling cap) and returns the result as data, so the client
can gate UI before offering the replace action.

The mutation remains the source of truth: race conditions between this
query and the mutation are surfaced on CreditCardActionableError via the
typed reason field.
"""
type CardReplacementEligibility {
  """
  Whether the user can request a card replacement right now.
  Null is treated the same as true by clients (fall back to letting the
  user attempt the mutation, which has the authoritative ErrorInfo path).
  """
  canReplace: Boolean

  """
  The policy that blocks replacement when canReplace is false.
  CARD_REPLACEMENT_ELIGIBILITY_REASON_UNSPECIFIED when canReplace is true.
  Null when canReplace is true or unknown.
  """
  reason: CardReplacementEligibilityReason

  """
  For REPLACEMENT_TOO_RECENT, the earliest time at which a replacement
  request will succeed. Null for every other reason (including the
  happy path) — see the reason enum for per-value details.
  """
  nextEligibleAt: Time
}

"""
Reason a card replacement is currently blocked. Surfaced on
CardReplacementEligibility so clients can pick a tailored UI variant
(e.g. a presentation-platform category) without trying the mutation first.

Mirrors the backend enum CardReplacementEligibilityReason in
servicing-api/v1/api.proto. Never rename or repurpose an existing value —
downstream clients pin to them by name on the wire. Clients must treat
unknown values as "blocked for an unknown reason" and fall back to a
generic message.
"""
enum CardReplacementEligibilityReason {
  """
  Default. Used when CardReplacementEligibility.canReplace is true, and
  also when the backend supplied an unknown reason.
  """
  CARD_REPLACEMENT_ELIGIBILITY_REASON_UNSPECIFIED

  """
  The per-account rolling cap on card replacements (e.g. N per X days)
  has been reached. nextEligibleAt is currently unset; precise
  "try again on …" timing may be added in a follow-up.
  """
  CARD_REPLACEMENT_ELIGIBILITY_REASON_ROLLING_CAP_EXCEEDED

  """
  A replacement was issued recently and the configured cool-down period
  has not elapsed. nextEligibleAt is set.
  """
  CARD_REPLACEMENT_ELIGIBILITY_REASON_REPLACEMENT_TOO_RECENT

  """
  Reserved. A replacement workflow for this account is already in flight.
  Today the backend does not emit this reason — see backend doc for the
  parity-gap rationale. The mutation surfaces an in-progress race via
  CreditCardActionableError instead.
  """
  CARD_REPLACEMENT_ELIGIBILITY_REASON_ALREADY_IN_PROGRESS

  """
  The selected card is not in a status that allows the requested
  replacement (e.g. FIRST_CARD requested but the physical card is no
  longer ON_HOLD, or a non-FIRST_CARD reason requested while the
  physical card is still ON_HOLD).
  """
  CARD_REPLACEMENT_ELIGIBILITY_REASON_INVALID_CARD_STATUS

  """
  The card replacement feature is disabled (killswitch off) for this
  card offering.
  """
  CARD_REPLACEMENT_ELIGIBILITY_REASON_FEATURE_DISABLED
}

"""
Card replacement fee policy information for a credit card account.
Provides details about the annual free replacement cap and applicable fees.
"""
type CardReplacementInfo {
  """
  The number of card replacements used in the current calendar year.
  This excludes the initial first card issuance.
  """
  currentYearReplaceCount: Int

  """The maximum number of free replacements allowed per calendar year."""
  freeReplacementsPerYear: Int

  """Whether a replacement fee will apply to the next replacement request."""
  willReplacementFeeApply: Boolean

  """The replacement fee amount in cents (e.g., 3000 = $30.00)."""
  replacementFeeAmountCents: Int
}

