"""
Safety details for transactions, or other entities that require safety warnings.
Typically, these are used for transactions that are being submitted to the blockchain, or messages that are being signed.
"""
type BaseAppSafetyDetails {
  """Unique identifier for the safety details"""
  id: ID

  """List of safety messages with their associated risk levels"""
  messages: [BaseAppSafetyMessage]

  """Details about the safety flow control to use"""
  flowControlDetails: BaseAppSafetyFlowControlDetails
}

"""The type of safety flow control to display."""
enum BaseAppSafetyFlowControlCategory {
  """Flow control, is unspecified"""
  UNSPECIFIED

  """
  Flow control indicating the user should be cautious, the app may for example create a cool down period before letting the user proceed
  """
  CAUTION

  """
  Flow control indicating danger content but allowing user to proceed with caution, typically the app will create a cool down period and also have a double confirmation for the flow the user is on
  """
  DANGER

  """
  Flow control indicating blocked content that prevents the user from proceeding.  This is used rarely - for example if the result of the transaction will be to add an unexpected owner to the user's wallet
  """
  BLOCKED

  """Flow control indicating async simulation is in progress"""
  PENDING
}

"""
Directional details about the safety flow to display - meaning this influences the app's behavior when deciding how to handle a certain flow.

For example, if the flowControl is SAFETY_FLOW_CONTROL_DANGER the app should create an appropriate friction point for the user i.e. a double confirmation.
"""
type BaseAppSafetyFlowControlDetails {
  """Unique identifier for the flow control details"""
  id: ID

  """The type of safety flow control to display"""
  flowControl: BaseAppSafetyFlowControlCategory
}

"""A safety message with associated risk level."""
type BaseAppSafetyMessage {
  """Unique identifier for the safety message"""
  id: ID

  """The safety message preview to display to the user"""
  preview: BaseAppSafetyMessagePreview

  """
  If there is more information than can fit in the preview, this is to show additional details about the warning, and potentially a link to the article
  """
  details: BaseAppSafetyMessageDetails

  """Analytics for safety message"""
  analytics: BaseAppSafetyMessageAnalytics

  """The risk level associated with this message"""
  safetyRiskLevel: BaseAppSafetyRiskLevel
}

"""Object enclosing analytics properties for the safety message."""
type BaseAppSafetyMessageAnalytics {
  """Unique identifier for the category"""
  id: ID

  """
  Safety check category - this is a low cardinality category of the type of issue that caused the safety check. This is to be used for analytics purposes rather than any logic / ui.
  """
  category: String
}

"""
If there is more information than can fit in the preview, this is to show additional details about the warning, and potentially a link to the article
"""
type BaseAppSafetyMessageDetails {
  """Unique identifier for the safety message details"""
  id: ID

  """
  The title of the message safety details section - localized in the user's language
  """
  title: String

  """
  The description of the message safety details section - localized in the user's language
  """
  description: String

  """
  An optional article that may link out to a website for learning even more about the safety message - localized in the user's language
  """
