"""
Input for quoting a full-close deleverage (repay with collateral).
Deleverage is full-close and collateral-funded, so it deliberately omits inputAmount
(no user-supplied amount) and paymentMethod (no external fund source) from the shared
quote core. A future partial deleverage would be a separate input/mutation.
"""
input DefiBorrowDeleverageQuoteInput {
  """The client making the request"""
  client: DefiBorrowClient!

  """The market whose position is being closed"""
  marketId: ThirdPartyIdString!

  """
  Quoting mode - determines whether to trigger full quote or dummy quote mode
  """
  quotingMode: QuotingMode

  """Signals whether the client wants to use optimistic signing flow"""
  useOptimisticSigning: Boolean
}

