"""
UserBenefitState
- isEligible: Deprecated. Use isBenefitActive instead.
- isBenefitActive: Whether the benefit is generally active for the user and displayable on the CB1 member screen.
    Note some benefits may require additional setup or activation, please refer to benefit-specific data for detailed activation status.
- isBenefitEligible: Whether the benefit is eligible to the user.
    For non-CB1 members, is_benefit_eligible returns whether the user will get the benefit once they subscribe to the Preferred plan
    For CB1 members, is_benefit_eligible returns whether the benefit is eligible on the subscriber's recurring paid plan. For example, if the user is on a paused plan, the benefit will be evalulated based on the recurring paid plan they will be switched to after the pause period ends.
- isSubscribed: Whether the user is an active subscriber.
- associatedBenefitId: The id of the benefit that is being evaluated to determine isBenefitEligible or isBenefitActive. This is only populated if the benefit is active or eligible.
- associatedSubscriptionId: The id of the active subscription for a CB1 member. This field won't be populated for non-CB1 members.
"""
type UserBenefitState {
  isEligible: Boolean @deprecated(reason: "use isBenefitActive instead")
  isBenefitActive: Boolean
  isBenefitEligible: Boolean
  isSubscribed: Boolean
  benefitExperiments: [BenefitExperiment]
  associatedBenefitId: ThirdPartyIdString
  associatedSubscriptionId: ThirdPartyIdString
}

