  """
  balances(contractAddresses: [String!], blockNumber: Int, assetUuids: [Uuid!]): [DefiAmount!]! @deprecated(reason: "Use nullable balancesV2 instead.")

  """
  Returns all the token amounts (including native ones) that the account has.
  The result can be filtered by specifying a list of contracts and/or a block height.
  The empty string represents a native-to-blockchain token.
