  """
  Chain-agnostic payment token for send flows.
  Accepts an AccountUrn and returns the preferred payment token based on static rank ordering.
  NetworkId is derived from the first explicit network_id on the URN.
  contractAddress is ignored when no network_id is present in the URN, because the same
  address can exist on multiple chains. This matches V1 behavior.
  
  For Bitcoin URNs (network_type=bitcoin, identifier_type=xpub_hash), contractAddress is
  always ignored regardless of network_id presence — Bitcoin has no token contracts, and
  the resolver always returns the native BTC token.
  
  When neither contractAddress nor network_id are provided, the resolver falls back to
  static rank ordering:
  - EVM: Base USDC → Base ETH → Ethereum USDC → Ethereum ETH
  - Solana: Solana USDC → Solana SOL
  - Bitcoin: BTC (native; no second token to rank against)
  The first token with a non-nil balance is returned; if all balances are zero, the
  highest-ranked token (e.g. Base USDC) is returned with a zero balance.
  """
  baseAppPaymentToken(account: AccountUrn!, contractAddress: String, currencyCode: CurrencyCode): TokenBalanceInterface

  """
  Chain-agnostic payment token for Send Via Link (SVL) flows.
  Only supports EVM networks — rejects Solana URNs.
  When a network_id is present in the URN, it is validated against SVL-supported networks.
  When no network_id is present, default SVL tokens are returned using static rank ordering.
  contractAddress is ignored when no network_id is present in the URN, because the same
  address can exist on multiple chains. This matches V1 behavior.
  
  When neither contractAddress nor network_id are provided, the resolver falls back to
  static rank ordering: Base USDC → Base ETH.
  The first token with a non-nil balance is returned; if all balances are zero, Base USDC
  is returned with a zero balance.
  """
  baseAppSendViaLinkToken(account: AccountUrn!, contractAddress: String, currencyCode: CurrencyCode): TokenBalanceInterface

