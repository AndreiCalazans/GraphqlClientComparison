"""
A MerchantProduct is a reusable catalog entity owned by a merchant — a
multi-use checkout button or donation page that carries the catalog data
(name / description / image) plus pricing. The `merchantProduct` prefix
avoids a collision with the retail-brokerage `Product` type in the `mono`
subgraph.

Buyer-info collection and PaymentLink minting do **not** live on this
type: they have moved to the `PaymentLinkPage` (L2) surface, which is
landed in a follow-up subgraph PR and references a MerchantProduct by
UUID. This type is intentionally pricing+catalog only.
"""
type MerchantProduct {
  id: ID

  """
  Stable, globally-unique, customer-shareable identifier (UUID v4).
  Suitable for use in public buyer-facing URLs.
  """
  uuid: Uuid

  """
  Merchant-supplied display name (e.g., "Large coffee", "Tip the artist").
  """
  name: String

  """
  Optional merchant-supplied description shown to buyers on the checkout page.
  """
  description: String
  status: ProductStatus
  pricingMode: PricingMode

  """
  Fixed price as a decimal string (e.g., "10.50"). Only set when
  pricingMode is FIXED_PRICE.
  """
  amount: Decimal

  """
  Lower bound (inclusive) for FLEXIBLE_PRICE checkouts as a decimal string.
  `null` means unbounded on the low side. Always `null` for FIXED_PRICE.
  """
  minimumAmount: Decimal

  """
  Upper bound (inclusive) for FLEXIBLE_PRICE checkouts as a decimal string.
  `null` means unbounded on the high side. Always `null` for FIXED_PRICE.
