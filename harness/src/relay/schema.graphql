"""
An error describing when a native SOL transfer would leave the sender's account
with a balance between zero and the rent-exempt minimum, which Solana disallows.
The user must either reduce the transfer amount (leaving at least the rent-exempt minimum
in the account), or use a full balance transfer to drain the account to zero.
"""
type InsufficientRentError implements BaseAppError {
  """the correlation ID of the error"""
  correlationId: ThirdPartyIdString

  """the trace ID of the error"""
  traceId: ThirdPartyIdString

  """
  the amount of the rent token that is insufficient, denoted in the smallest unit of the asset (e.g. lamports for SOL)
  """
  missingCryptoAmount: String

  """
  the amount of the rent token that is insufficient, denoted in the smallest unit of the asset (e.g. lamports for SOL)
  """
  missingFiatAmount(currencyCode: CurrencyCode!): String

  """the token that is insufficient for rent, chain-agnostic"""
  tokenInfo: TokenInterface
}

