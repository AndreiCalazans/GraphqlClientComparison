  """
  Do not proceed to the commit phase. The user needs to wait, because recovery is in progress.
  The user has at least one registered FIDO key in his Coinbase account, but none of them are synchronized onchain yet.
  The user needs to wait for at least one of these FIDO keys to be added onchain, then generate a new quote.
  """
  RECOVERY
}

