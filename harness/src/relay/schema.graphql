"""
Exit control guidance returned after a commit is blocked with EXIT_CONTROL_BLOCKED.
Populated in a single RGS call by the parent exitControl resolver; child fields are
plain reads with no additional RPCs.
"""
type ExitControlGuidance {
  """
  Maximum amount the user can send for this asset, denominated in targetCurrency.
  Returns null when the cap cannot be computed. A zero amount indicates a full block.
  """
  maxAllowedAmountForAsset: Amount

  """
  Maximum amount the user can withdraw to this payment method, denominated in targetCurrency.
  Returns null when the cap cannot be computed. A zero amount indicates a full block.
  """
  maxAllowedAmountForPaymentMethod: Amount

  """
  Source-deposit ACH payment methods available as the same-channel escape valve.
  Pre-filtered to the user's source-deposit ACH banks with eligible PMs, pre-sorted by
  cap descending. The set is bounded (typically ≤5 entries per user); no pagination needed.
  """
  sourcePaymentMethods: [ExitControlSourcePaymentMethod]
}

"""
A source-deposit ACH payment method entry returned by exit control guidance, including its
full payment method details (resolved via PMS), per-PM exit cap, and active status.
"""
type ExitControlSourcePaymentMethod {
  """Full payment method details resolved from PMS."""
  paymentMethod: PaymentMethodV2

  """Per-payment-method exit cap denominated in targetCurrency."""
  maxAllowedAmount: Amount

  """
  Whether this payment method is active and available for withdrawal.
  Sourced explicitly from RGS exit control data; maps to !isRevoked on the underlying PM model.
  """
  isActive: Boolean
}

