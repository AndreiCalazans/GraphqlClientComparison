"""A spend permission granted to a connected app's sub-account."""
type BaseAppSpendPermission {
  """Unique identifier for this permission (permission hash)."""
  id: ID

  """
  Whether this permission has been manually revoked by the user. This is
  independent of expiration — a permission can be revoked even if expiresAt
  has not yet passed.
  """
  isRevoked: Boolean

  """Timestamp when this permission was granted."""
  createdAt: Time

  """
  Timestamp when the user manually revoked this permission, or null if the
  user has not revoked it. A null value does not imply the permission is
  currently usable — check expiresAt to determine if the permission has
  expired.
  """
  revokedAt: Time

  """
  Timestamp when this permission expires. Expiration is independent of
  revocation — a permission may be expired without being revoked, and
  vice versa.
  """
  expiresAt: Time

  """
  The maximum token amount that can be spent per period, in the smallest
  unit (e.g., wei of ETH). Base-10 string representation of a uint256.
  """
  allowance: String

  """The spending period in seconds."""
  period: Int

  """The network this permission is valid on."""
  networkId: NetworkId

  """
  The token this permission covers, with full metadata (name, icon, decimals, etc.).
  """
  token: EthereumToken

  """The spender address authorized to spend on behalf of the sub-account."""
  spenderAddress: String

  """
  Unix timestamp (seconds) when the permission becomes valid, encoded as
  a bigint string. Null indicates no lower bound on validity — clients
  reconstructing the on-chain SpendPermission struct (e.g. for
  SpendPermissionManager.getCurrentPeriod) should encode null as `0`
  (uint48).
  """
  start: String

  """
  Unix timestamp (seconds) when the permission expires, encoded as a
  bigint string. The Time-typed `expiresAt` is the UI-friendly
  representation; `end` is the raw uint48 needed for on-chain struct
  reconstruction. Null indicates no expiration set — clients should
  encode null as `0` when rebuilding the struct.
  """
  end: String

  """
  Salt that disambiguates otherwise-identical permissions for the same
  (account, spender, token, allowance, period). Bigint string to support
  uint256 values. Null when the upstream record has no salt set.
  """
  salt: String

  """
  Hex-encoded extra data passed through to SpendPermissionManager
  (0x-prefixed). Null when no extra data is set — clients should encode
  null as `0x` (empty bytes) when rebuilding the struct.
  """
  extraData: String
}

"""Input representing a spend permission to revoke"""
input BaseAppSpendPermissionInput {
  """The spender address that was granted permission"""
  spender: String!

  """
  The token contract address. Absent when the native asset has no contract address (e.g., ETH on Base)
  """
  token: String

  """
  The allowance amount per period in the token's smallest unit (e.g., wei for ETH). Expressed as a decimal string to support uint160 values.
  """
  allowance: String!

  """
  The time period for allowance refresh, in seconds. Expressed as a decimal string to support large values.
  """
  period: String!

  """
  The start time of the permission as a Unix timestamp in seconds. Expressed as a decimal string to support large values.
  """
  start: String!

  """
  The end time of the permission as a Unix timestamp in seconds. Expressed as a decimal string to support large values.
  """
  end: String!

  """The salt for uniqueness, expressed as a decimal string"""
  salt: String!

  """Extra data for the permission, hex-encoded with 0x prefix"""
  extraData: String!
}

