"""Live order-book snapshot for a single outcome token."""
type BaseAppPredictionMarketOrderBook {
  """Buy-side price levels."""
  bids: [BaseAppPredictionMarketOrderBookLevel]

  """Sell-side price levels."""
  asks: [BaseAppPredictionMarketOrderBookLevel]

  """
  Minimum price increment as a decimal string (from CLOB /midpoint metadata).
  """
  minTickSize: String

  """Minimum order size as a USD decimal string."""
