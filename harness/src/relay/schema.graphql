}

"""
DepositInfoError enumerates the user-actionable reasons that
`depositInfoWithError` can fail. Maps 1:1 to btcrossriver's
`coinbase.btcrossriver.api.DepositInfoFailureReason`. Reserve new values
in monotonic order — never renumber/reuse.
"""
enum DepositInfoError {
  """Generic / unclassified upstream failure."""
  UNKNOWN

  """Upstream call timed out (gRPC DeadlineExceeded)."""
  TIMEOUT

  """
  End user's tax id (SSN/EIN/ITIN) on file failed CrossRiver profile
  validation. The user must resubmit their W-9 to update the value.
  """
  INVALID_TAX_ID

  """
  End user's stored address failed CrossRiver profile validation (e.g.
  missing required fields). The user must supply a valid address via the
  in-app address form to complete activation.
  """
  INVALID_ADDRESS
}

"""
DepositInfoResult is the in-band result envelope returned by
`viewer.depositInfoWithError`. On success, `depositInfo` is populated and
`error` is null. On a known/actionable upstream failure (e.g. user must
update their W-9), `depositInfo` is null and `error` carries the typed
reason so clients can render a remediation flow instead of a generic
error. Mirrors the `PaymentMethodsV2Result` precedent.
"""
type DepositInfoResult {
  """The deposit info returned on success; null when error is set."""
  depositInfo: DepositInfo

  """The typed error reason on failure; null when depositInfo is set."""
  error: DepositInfoError
}

