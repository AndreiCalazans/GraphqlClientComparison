  """
  Amount the user wants to transact. Amount.currency is ignored, since assetReference overrides it.
  """
  amount: AmountInput!

  """
  When assetReference is SOURCE, the backend assumes that amount.value is expressed in MagicPlatformTransactionSource's currency
  When assetReference is TARGET, the backend assumes that amount.value is expressed in assetContractAddress's currency
  """
  assetReference: MagicPlatformAssetReference!

  """
  Transaction Parameters (mutually exclusive).
  
  Different types require different parameters and security checks and result in different transaction semantics.
  """
  valueSendParameters: MagicPlatformTransactionValueSendParameters
  erc20SendParameters: MagicPlatformTransactionERC20SendParameters
  commerceCheckoutV1Parameters: MagicPlatformTransactionCommerceCheckoutV1Parameters
