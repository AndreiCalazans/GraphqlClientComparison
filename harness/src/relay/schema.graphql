"""
Orchestration-level failure codes for the USDC auto-buy workflow. Detailed
leg-failure reasons (insufficient balance, preview expired, RBA-specific
rejections, etc.) live on the child trade and surface via the parent trade's
cancelReason.
"""
enum AutoBuyErrorCode {
  UNSPECIFIED

  """Fiat→USDC funding leg failed."""
  FUNDING_FAILED

  """Funding leg did not settle within the workflow's timeout."""
  FUNDING_TIMEOUT

  """
  Downstream product action (e.g. equity order) failed after funding settled.
  """
  PRODUCT_ACTION_FAILED
}

"""
Metadata about a child funding trade created when a parent order requires
intermediate funding. Currently used for INTL USDC auto-buy, where a fiat
balance (e.g. GBP/EUR) is converted to USDC before placing the parent
equity order. Clients can use `fundingTradeId` to fetch the funding leg
independently and surface its status.
"""
type AutoBuyInfo {
  """
  ID of the child fiat→USDC funding trade. Null when the parent trade has no auto-buy funding leg.
  """
  fundingTradeId: ThirdPartyIdString

  """
  Lifecycle phase of the USDC auto-buy workflow. Lets clients render phase-aware UI without polling the child funding trade.
  """
  currentPhase: AutoBuyPhase

  """
  Orchestration-level failure code. UNSPECIFIED unless the workflow has terminally failed; pair with currentPhase = FAILED.
  """
  errorCode: AutoBuyErrorCode
}

"""
Lifecycle phase of the USDC auto-buy workflow that funds equity orders on
platforms where the user holds fiat (e.g. GBP/EUR) but the product action
requires USDC.
"""
enum AutoBuyPhase {
  UNSPECIFIED

  """Parent trade created; funding leg not yet committed."""
  CREATED

  """Fiat→USDC funding trade in flight."""
  FUNDING

  """Funding settled; downstream product action in flight."""
  PRODUCT_ACTION

  """Both legs settled successfully."""
  COMPLETED

  """Workflow terminally failed; pair with AutoBuyErrorCode."""
  FAILED
}

