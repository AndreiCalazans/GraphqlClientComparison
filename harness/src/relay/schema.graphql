"""
Everything that can happen while an agent turn is being generated.
Returned by the `baseAppAgentChatStream` subscription.
"""
union BaseAppAgentChatStreamEvent = BaseAppAgentMessageStart | BaseAppAgentTokenEvent | BaseAppAgentMessageComplete | BaseAppAgentPlanningUpdate | BaseAppAgentToolExecutionUpdate | BaseAppAgentExecutionUpdate | BaseAppAgentErrorEvent | BaseAppAgentHeartbeatEvent

"""
Input for starting a new agent chat turn.

Uses an input wrapper rather than direct arguments (unlike the
c3/ai-advisor-service precedent) because wallet-gql's `wgql` lint requires
`activeProfileAddress` to be delivered inside an input struct so the viewer
profile can be set consistently across all base-app subscriptions.
"""
input BaseAppAgentChatStreamInput {
  """
  Conversation/session ID. Pass existing ID to continue, or a new UUID to start.
  """
  sessionId: ThirdPartyIdString!

  """The user's message text."""
  message: String!

  """Active profile address for auth context."""
  activeProfileAddress: String!

  """
  ISO-4217 fiat currency code (e.g., "USD", "EUR") the user prefers for this
  turn. Forwarded to agent-orchestration-service as
  `RequestContext.userFiatCurrency` so tool responses (portfolio, price
  charts, suggested-trade notional amounts) come back denominated in the
  user's currency. Omit when unknown; AOS falls back to USD.
  """
  fiatCurrencyCode: String
}

"""Input for requesting a graceful end of an active agent chat stream."""
input BaseAppAgentEndStreamInput {
  """Session to terminate."""
  sessionId: ThirdPartyIdString!

  """Active profile address for auth context."""
  activeProfileAddress: String!
}

"""
Result of an end-stream request. Modeled as a union so additional specific,
actionable error members can be added without breaking existing clients.
Unexpected / unclassified failures are surfaced via the resolver's built-in
error return rather than a typed payload member.
"""
union BaseAppAgentEndStreamPayload = BaseAppAgentEndStreamSuccess | BaseAppAgentEndStreamSessionNotFoundError

"""
Returned when the requested session has no active stream — it was never
started, already completed naturally, or already ended by a previous call.
Clients can treat this as a benign no-op (the desired end state is already
reached) rather than a hard failure.
"""
type BaseAppAgentEndStreamSessionNotFoundError {
  """The session ID that could not be found or was not active."""
  sessionId: ThirdPartyIdString

  """Human-readable explanation for logs/UX."""
  message: String
}

"""Indicates the end-stream request was accepted by the server."""
type BaseAppAgentEndStreamSuccess {
  """The session that was signaled to end."""
  sessionId: ThirdPartyIdString
}

"""Stream-level error."""
type BaseAppAgentErrorEvent {
  """Monotonic sequence number for this event within the stream."""
  sequenceNumber: Int

  """Error code for programmatic handling."""
  code: String

  """Human-readable error message."""
  errorMessage: String

  """Event timestamp in RFC 3339 format."""
  timestamp: Time
}

"""
Synthesis-phase update. Brackets the executor LLM call that produces the
final user-facing response after planning + tool execution finish. Lets
clients observe the otherwise-invisible gap between the last tool
completion and the first streamed token.

`status` values:
  - "started"   — emitted before the executor LLM call.
  - "completed" — emitted after a successful executor call. `timeMs` is
                  wall-clock duration of the executor call in milliseconds.
  - "failed"    — emitted on the error path; `timeMs` is wall-clock
                  duration up to the failure. The terminal error event is
                  the authoritative failure signal.
"""
type BaseAppAgentExecutionUpdate {
  """Monotonic sequence number for this event within the stream."""
  sequenceNumber: Int

  """Synthesis status (started, completed, failed)."""
  status: String

  """Wall-clock time for the executor LLM call in milliseconds."""
  timeMs: Int

  """Event timestamp in RFC 3339 format."""
  timestamp: Time
}

"""Reason why the agent stopped generating a response."""
enum BaseAppAgentFinishReason {
  """
  Unspecified sentinel; reserved for future use and default-value safety.
  """
  FINISH_REASON_UNSPECIFIED

  """The agent completed its turn naturally."""
  END_TURN

  """Generation was stopped externally (e.g., user tapped Stop)."""
  STOPPED

  """Generation ended due to an error."""
  ERROR

  """Generation stopped because the maximum token limit was reached."""
  MAX_TOKENS
}

"""Heartbeat to keep the connection alive through proxies/load balancers."""
type BaseAppAgentHeartbeatEvent {
  """Event timestamp in RFC 3339 format."""
  timestamp: Time
}

"""Agent message generation completed."""
type BaseAppAgentMessageComplete {
  """Monotonic sequence number for this event within the stream."""
  sequenceNumber: Int

  """Reason why generation finished (e.g., END_TURN, STOPPED, ERROR)."""
  finishReason: BaseAppAgentFinishReason

  """Event timestamp in RFC 3339 format."""
  timestamp: Time

  """The assembled agent message text."""
  message: String

  """
  Actions the agent suggests the user take for this turn (e.g., trades, and future transfer/swap/alert types).
  """
  actions: [BaseAppAgentAction]

  """Total pipeline time in milliseconds."""
  totalTimeMs: Int
}

"""Emitted at the start of the agent message."""
type BaseAppAgentMessageStart {
  """Monotonic sequence number for this event within the stream."""
  sequenceNumber: Int

  """Event timestamp in RFC 3339 format."""
  timestamp: Time

  """The session ID for this conversation."""
  sessionId: ThirdPartyIdString
}

"""Planning phase update."""
type BaseAppAgentPlanningUpdate {
  """Monotonic sequence number for this event within the stream."""
  sequenceNumber: Int

  """Planning status (e.g., started, completed)."""
  status: String

  """Summary of the plan once completed."""
  planSummary: String

  """Number of tools the planner scheduled for this turn."""
  toolCount: Int

  """
  0-indexed planning pass within the current turn. Increments when the planner requests another pass (replanning loops); the first plan is iteration 0.
  """
  iteration: Int

  """Event timestamp in RFC 3339 format."""
  timestamp: Time
}

"""
Same event set as `BaseAppAgentChatStreamEvent`, returned by the
`baseAppAgentReconnectToStream` subscription. Declared as a distinct union so
the subscription's return type matches its name, per the schema's subscription
naming convention.
"""
union BaseAppAgentReconnectToStreamEvent = BaseAppAgentMessageStart | BaseAppAgentTokenEvent | BaseAppAgentMessageComplete | BaseAppAgentPlanningUpdate | BaseAppAgentToolExecutionUpdate | BaseAppAgentExecutionUpdate | BaseAppAgentErrorEvent | BaseAppAgentHeartbeatEvent

"""
Input for reattaching to a chat stream that is still running server-side.
"""
input BaseAppAgentReconnectToStreamInput {
  """Session to reconnect to."""
  sessionId: ThirdPartyIdString!

  """Active profile address for auth context."""
  activeProfileAddress: String!
}

"""
A suggested trade produced by the agent's analysis during a chat turn.

The trade identifies the target asset by on-chain coordinates
(networkId + contractAddress, or networkId + isNative=true for a native asset)
rather than by symbol, so clients resolve a stable token record via the
`token` field rather than re-deriving it from ambiguous ticker strings.
"""
type BaseAppAgentSuggestedTrade {
  """Direction of the trade (BUY or SELL)."""
  action: BaseAppAgentTradeAction

  """Network the target asset lives on (e.g., networks/ethereum-mainnet)."""
  networkId: NetworkId

  """
  On-chain contract address of the target asset.
  Empty when `isNative` is true; otherwise the ERC-20 / SPL mint address.
  """
  contractAddress: String

  """
  True when the suggestion targets the network's native asset
  (ETH on Ethereum, SOL on Solana, BTC on Bitcoin, etc.).
  When true, clients should ignore `contractAddress`.
  """
  isNative: Boolean

  """
  Suggested notional amount expressed in fiat (not in token units).
  Decimal string, e.g. "25.00". Null when the agent did not quote an amount.
  """
  fiatAmount: String

  """
  ISO-4217 fiat currency code for `fiatAmount` (e.g., "USD", "EUR").
  Present when `fiatAmount` is present; echoes `RequestContext.userFiatCurrency`
  (or the AOS default) so clients never have to guess.
  """
  fiatCurrency: String

  """The agent's reasoning for suggesting this trade."""
  reason: String

  """
  Enriched token details resolved from (networkId, contractAddress).
  Populated by wallet-gql via the chain-agnostic token dataloader;
  null when enrichment fails or the token is not known.
  """
  token: TokenInterface
}

"""Emitted for each streamed text token."""
type BaseAppAgentTokenEvent {
  """Monotonic sequence number for this event within the stream."""
  sequenceNumber: Int

  """Monotonic index for idempotency/ordering within the turn."""
  index: Int

  """Text content of this token chunk."""
  text: String

  """Event timestamp in RFC 3339 format."""
  timestamp: Time
}

"""Tool execution update."""
type BaseAppAgentToolExecutionUpdate {
  """Monotonic sequence number for this event within the stream."""
  sequenceNumber: Int

  """
  User-visible category of work the agent is performing for this tool call.
  Decoupled from internal tool/service names so renaming or reimplementing
  backend tools is not a breaking schema change, and so the wire never leaks
  internal service identity. See BaseAppAgentToolKind for the stable vocabulary.
  """
  toolKind: BaseAppAgentToolKind

  """Execution status (started, completed, failed)."""
  status: String

  """Summary of the result once completed."""
  resultSummary: String

  """Wall-clock time for this tool invocation in milliseconds."""
  timeMs: Int

  """
  Planning pass (see BaseAppAgentPlanningUpdate.iteration) that produced this tool call. Lets clients group tools with the planning pass that scheduled them when replanning loops occur.
  """
  iteration: Int

  """Event timestamp in RFC 3339 format."""
  timestamp: Time
}

"""
User-visible category of work the agent performs during a tool call.
Values are intentionally oriented around user-facing intent rather than
engineering boundaries, so adding, renaming, splitting, merging, or
swapping the provider of an internal tool is invisible to clients as
long as the category of work is the same.

The backend is responsible for mapping each concrete tool to exactly one
kind. Tools without a mapping MUST emit TOOL_KIND_UNSPECIFIED or OTHER
and the schema MUST NEVER surface internal service or function names.
"""
enum BaseAppAgentToolKind {
  """
  Unspecified sentinel; reserved for forward compat and default-value safety.
  """
  TOOL_KIND_UNSPECIFIED

  """Agent is inspecting the user's holdings, balances, or wallet state."""
  PORTFOLIO

  """
  Agent is fetching market data — prices, charts, volume, on-chain metrics.
  """
  MARKET_DATA

  """
  Agent is performing research — news, sentiment, prediction markets, analysis.
  """
  RESEARCH

  """Agent is pricing, quoting, simulating, or otherwise preparing a trade."""
  TRADE

  """Agent is looking up past transactions, transfers, or activity history."""
  ACTIVITY

  """
  Agent is searching for assets, creators, apps, or other discoverable entities.
  """
  DISCOVERY

  """
  Agent is doing something that doesn't fit a currently-defined category.
  """
  OTHER
}

"""Direction of a suggested trade."""
enum BaseAppAgentTradeAction {
  """
  Unspecified sentinel; reserved for forward compat and default-value safety.
  """
  TRADE_ACTION_UNSPECIFIED

  """Buy the target asset with fiat or a cash-like asset."""
  BUY

  """Sell the target asset for fiat or a cash-like asset."""
  SELL
}

