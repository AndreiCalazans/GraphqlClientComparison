"""
Breakdown of cash that is unavailable, with pending activity and per-category positions.
"""
type CashUnavailableBreakdown {
  """Total amount of cash that is currently unavailable."""
  totalBalance: Amount

  """
  Per-category breakdown of unavailable ("In Use") cash. Amounts are
  authoritative and reconcile to totalBalance within a sub-cent tolerance
  (Σ item.amount == totalBalance; FX dust is not surfaced as a separate line,
  and negative upstream values are clamped and logged). Each item carries a lazy
  `detail` drill-down. Clients group items into display sections
  (Pending / Open orders / Lending / Other) by category.
  """
  breakdown: [CashUnavailableCategoryBreakdown]

  """Per-category unavailable positions (e.g. lending, limit orders)."""
  positions: [CashUnavailablePosition] @deprecated(reason: "Always empty and unused. Use the per-category position fields instead.")

  """
  Paginated pending transactions that contribute to the unavailable balance.
  """
  pendingTransactions(first: Int, after: String): CashPendingTransactionConnection

  """
  Paginated prediction-market positions whose notional value contributes to
  unavailable cash. Lazily hydrated from the prediction-market product
  service when marketName, outcome, or an icon URL is selected.
  """
  predictionPositions(first: Int, after: String): CashPredictionPositionConnection

  """
  Coinbase Secured Card USDC collateral position contributing to unavailable
  cash. Returns 0 or 1 entry: nil when the viewer has no secured-card
  collateral locked, populated with the lock amount otherwise.
  """
  collateralPosition: CashCollateralPosition

  """
  Paginated open SPOT BUY limit-order positions. Deprecated — use
  spotLimitOrderPositions instead.
  """
  limitOrderPositions(first: Int, after: String): BrokerageOrderConnection @deprecated(reason: "Use spotLimitOrderPositions instead.")

  """
  Paginated open SPOT BUY limit-order positions whose reserved cash contributes
  to the unavailable balance. Standard Relay cursor pagination; values of
  `first` exceeding 50 are silently capped.
  """
  spotLimitOrderPositions(first: Int, after: String): BrokerageOrderConnection

  """
  Paginated open EQUITY BUY limit-order positions whose reserved cash
  contributes to the unavailable balance. Standard Relay cursor pagination;
  values of `first` exceeding 50 are silently capped.
  """
  equityLimitOrderPositions(first: Int, after: String): BrokerageOrderConnection

  """
  Paginated open EQUITY_OPTION BUY limit-order positions whose reserved cash
  contributes to the unavailable balance. Standard Relay cursor pagination;
  values of `first` exceeding 50 are silently capped.
  """
  equityOptionLimitOrderPositions(first: Int, after: String): BrokerageOrderConnection

  """
  Paginated DeFi lending positions (USDC vault supply) whose current value
  contributes to unavailable cash. Sourced from defi-lend.GetUserSmartContracts
  joined with portfolio-service balances for ACCOUNT_TYPE_RETAIL_DEFI_LEND.
  """
  lendingPositions(first: Int, after: String): CashLendingPositionConnection
}

"""Reason a portion of the user's cash is considered unavailable."""
enum CashUnavailableCategory {
  """Funds committed to lending products."""
  LENDING

  """Funds reserved by open limit orders."""
  LIMIT_ORDER

  """Settled cash held in the derivatives (futures) account."""
  DERIVATIVES

  """Funds held against open prediction market positions."""
  PREDICTIONS

  """
  Excess cash from prediction markets positions awaiting sweep back to available balance.
  """
  PREDICTION_SETTLEMENT_PENDING

  """
  Funds held pending deposit confirmation or settlement. (Equities/stock order
  holds are included in the amount but are not yet decomposed in `detail` —
  follow-up CSHTM-2599.)
  """
  HOLDS_PENDING

  """
  Cash in transit from the spot account to the derivatives (futures) account —
  pending transfer to derivatives.
  """
  PENDING_SWEEP

  """Funds held as collateral for DeFi borrow positions."""
  COLLATERAL

  """Funds deployed into Advanced (consumer) portfolios."""
  ADVANCED_PORTFOLIO

  """Funds earning yield through DeFi lending protocols."""
  DEFI_LENDING

  """Funds held as collateral for a CB Borrow / spot-margin loan."""
  LOAN_COLLATERAL

  """Funds locked as collateral for a Coinbase Secured Card."""
  CREDIT_CARD_COLLATERAL

  """Funds held by regulatory restriction or compliance mandate."""
  RESTRICTED

  """Catch-all for unavailable cash not attributable to a known category."""
  OTHER

  """Cash held in a Coinbase Vault."""
  VAULT

  """Cash committed to staking products."""
  STAKING
}

