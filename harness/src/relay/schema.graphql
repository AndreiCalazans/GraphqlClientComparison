  Base borrow APR in basis points (e.g. 350 = 3.50%), with the servicing fee EXCLUDED. Use effectiveApr for the all-in rate.
  """
  aprBps: Int!

  """
  All-in APR for this option in basis points: aprBps + servicingFeeRateBps,
