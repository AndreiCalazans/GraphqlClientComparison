All APR are percentages expressed as a decimal between 0 and 1. For example, 4% is expressed as 0.04
"""
type DefiBorrowApr {
  """Current APR for the market. This is the APR for the current block."""
  aprCurrent: Decimal

  """Average APR for the last 24 hours."""
  apr1Day: Decimal

  """Average APR for the last 7 days."""
  apr7Day: Decimal

  """Average APR for the last 30 days."""
  apr1Month: Decimal

  """Average APR for the last 90 days."""
  apr3Month: Decimal
}

