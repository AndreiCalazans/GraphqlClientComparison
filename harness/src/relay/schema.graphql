"""
Filter by asset visibility status based on the asset owner's preferences.
Hidden assets are those the owner has manually hidden from their portfolio view.
Reported assets are those the owner has flagged as spam.
"""
enum AssetVisibilityFilter {
  """No filter applied, returns all assets regardless of visibility status"""
  ALL

  """Only returns assets that are not hidden and not reported as spam"""
  VISIBLE_ONLY

  """
  Only returns assets the owner has manually hidden (excludes reported spam)
  """
  HIDDEN_ONLY

  """Only returns assets the owner has reported as spam"""
  REPORTED_ONLY

  """Only returns assets that are considered dust (very low value)"""
  DUST_ONLY
}

