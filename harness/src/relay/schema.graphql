"""
Snapshot of a retail user's retail→CoinBiz conversion treatment — current
lifecycle status, the Day-30 deposit-restriction countdown, and the
in-flight KYB application id if there is one.
"""
type RetailCoinbizConversion {
  """Current lifecycle stage of the conversion treatment."""
  status: RetailCoinbizConversionStatus

  """
  Days remaining until the Day-30 payment-method deposit restriction kicks
  in. Only meaningful in the ACTION_REQUIRED state; null otherwise.
  """
  daysUntilRestriction: Int

  """
  UUID of the in-flight KYB application, once the user has chosen the
  convert-in-place path and started an application. Null before submission.
  """
  kybApplicationId: ThirdPartyIdString

  """UUIDs of the business payment methods the user was enrolled with."""
  paymentMethodIds: [ThirdPartyIdString]
}

"""Lifecycle states for the retail→CoinBiz conversion treatment."""
enum RetailCoinbizConversionStatus {
  """
  User has been enrolled and must choose to convert or unlink. Initial state.
  """
  ACTION_REQUIRED

  """
  User chose convert-in-place; KYB application is in flight (not yet submitted).
  """
  IN_PROGRESS

  """KYB application submitted; awaiting BPS decision."""
  SUBMITTED

  """KYB approved; awaiting IOS provisioning."""
  APPROVED

  """
  Terminal: KYB rejected; payment method removal queued. User cannot retry.
  """
  REJECTED

  """
  Day 30: payment-method deposit restriction applied. User can still resolve
  by choosing a path before Day 60.
  """
  RESTRICTED

  """Terminal: convert-in-place provisioned. CoinBiz account is live."""
  COMPLETED

  """Terminal: stay-retail chosen; business payment method removed."""
  UNLINKED

  """
  Stay-retail chosen and the FE has acknowledged the business payment
  method deletion (PMS DeletePaymentMethod returned). Awaiting the
  PaymentMethodEvent consumer to converge to UNLINKED. Functionally
  treated as "unlink in progress" by the FE — banner hides, modal closes.
  """
  PENDING_UNLINK
}

