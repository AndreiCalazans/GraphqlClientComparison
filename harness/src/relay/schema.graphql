"""Represents an ejection record - exposes EjectionRecord from MongoDB"""
type Ejection {
  """Unique identifier (maps to EjectionRecord.ejection_id)"""
  id: ID

  """The wallet being ejected"""
  wallet: MagicWallet

  """Overall status (high-level progress)"""
  status: EjectionStatus

  """Results of all eligibility checks"""
  eligibilityChecks: EligibilityChecks

  """Base Account information (null until Phase 2)"""
  baseAccount: BaseAccountInfo

  """Transaction details for blockchain operations"""
  transactions: EjectionTransactions

  """Timestamps for each phase"""
  timeline: EjectionTimeline

  """Whether wallet usage is currently blocked"""
  isBlocked: Boolean

  """
  What user should do next - drives UI (computed from EjectionPhase + state)
  """
  nextAction: EjectionNextAction

  """Created timestamp"""
  createdAt: Time

  """Last updated timestamp"""
  updatedAt: Time
}

enum EjectionAction {
  """Action is unspecified or unknown"""
  UNSPECIFIED

  """User must complete identity verification"""
  IDENTITY_VERIFICATION

  """User must acknowledge scam waiver"""
  SCAM_WAIVER

  """Sign in to Base Account (Phase 2)"""
  AUTHENTICATE_BASE_ACCOUNT

  """Wait for Base Account to be added as owner on-chain"""
  WAIT_FOR_BASE_ACCOUNT_OWNER_ADDITION

  """Register SubAccount in Base (Phase 3)"""
  REGISTER_SUBACCOUNT

  """Wait for Coinbase owners to be removed (Phase 4 - auto)"""
  WAIT_FOR_OWNER_REMOVAL

  """Ejection complete - no action needed"""
  COMPLETE

  """System checks failed - cannot proceed"""
  INELIGIBLE

  """Trigger private key export for Solana (Phase 2)"""
  TRIGGER_EXPORT

  """Wait for private key export to complete"""
  WAIT_FOR_EXPORT

  """Confirm saved private key for Solana (Phase 3)"""
  CONFIRM_SAVED_KEY

  """Wait for product cleanup to complete (common final phase)"""
  WAIT_FOR_PRODUCT_CLEANUP
}

"""Contains eligibility information for wallet ejection"""
type EjectionEligibility {
  """Whether the wallet is eligible for ejection"""
  isEligible: Boolean

  """Reason why the wallet is not eligible (if applicable)"""
  reason: String
}

type EjectionNextAction {
  """
  What action user should take next - the action type itself indicates what to do
  """
  action: EjectionAction
}

"""High-level ejection status (from proto)"""
enum EjectionStatus {
  """Ejection status unspecified"""
  EJECTION_STATUS_UNSPECIFIED

  """Ejection is in progress"""
  EJECTION_STATUS_IN_PROGRESS

  """Ejection completed successfully"""
  EJECTION_STATUS_COMPLETED

  """Ejection failed"""
  EJECTION_STATUS_FAILED
}

type EjectionTimeline {
  """When ejection record was created"""
  createdAt: Time

  """When eligibility checks completed (CHECKING_ELIGIBILITY phase done)"""
  eligibilityCheckedAt: Time

  """
  When Base Account was added as owner on-chain (PHASE_BASE_ACCOUNT_ADDED)
  """
  baseAccountAddedAt: Time

  """When SubAccount was registered (PHASE_SUBACCOUNT_REGISTERED)"""
  subaccountRegisteredAt: Time

  """When Coinbase owners were removed (PHASE_COINBASE_OWNERS_REMOVED)"""
  ownersRemovedAt: Time

  """When Solana private key export was requested (PHASE_EXPORT_INITIATED)"""
  exportRequestedAt: Time

  """When ejection completed (PHASE_COMPLETED)"""
  completedAt: Time
}

type EjectionTransactions {
  """Transaction adding Base Account as owner"""
  addOwner: BlockchainTransaction

  """Transaction removing Coinbase owners"""
  removeOwners: BlockchainTransaction
}

