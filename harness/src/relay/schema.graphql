  Use only for internal and debug purposes.
  Default is `false`.
  """
  includeTestNetworks: Boolean

  """
  If true, the result will include assets on networks that are not yet fully supported.
  This alone will not expose testnets, to include them pass `includeTestNetworks` as well.
  Use only for internal and debug purposes.
  Default is `false`.
  """
  includeUnsupportedNetworks: Boolean

  """
  List of asset contract addresses that should be included in the balance calculation.
  If not specified, the balance will include all the funds on all known assets we have price information about.
  """
  assetContractAddresses: [String!]

  """
  List of all the wallet types owned by user that should be
  included in the balance calculation.
  Defaults to `[WEB3_WALLET]`.
  """
  walletAccountTypes: [Web3WalletAccountType!]
}

