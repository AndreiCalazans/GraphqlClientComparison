  transactions(first: Int = 3, after: String, category: [TransactionCategoryInput!], statusGroup: TransactionStatusGroup, status: [TransactionStatusInput!], filterType: [TransactionFilterTypeInput!], accountUuid: Uuid, startDate: Time, endDate: Time, includeVoided: Boolean = false, searchQuery: String): CreditCardTransactionConnection

  """The transaction for the credit card by uuid."""
