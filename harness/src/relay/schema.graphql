  verb: MagicPlatformSemanticVerb!

  """
  The client name used for the user interface.
  Optional for now - will default to MINI_DAPP in the code if not specified.
  """
  client: MagicPlatformQuoteClient

  """
  A web application domain that initiates the transaction. For example: "standwithcrypto.org"
  Must be specified for security reasons.
