  """
  location: String @deprecated(reason: "Use merchant.address instead")

  """Current status of the transaction"""
  status: CreditCardTransactionStatus

  """
  The category of the card used in the transaction ie. "Physical", "Virtual"
  """
  cardCategory: CardCategory

  """The balance payment information associated with the transaction"""
  payment: CreditCardPayment @deprecated(reason: "Use paymentV3 instead")

  """The balance payment information associated with the transaction"""
  paymentV2: CreditCardPaymentV2 @deprecated(reason: "Use paymentV3 instead")

  """
  The payment record for this transaction as a normalized Payment type,
  enabling Relay to share a single store entry with CreditCard.payments.
