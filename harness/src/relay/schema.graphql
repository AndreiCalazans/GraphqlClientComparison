"""
Root event type for the assetUpdates subscription.
Fields are nullable — only fields with new data are populated per tick.
Audit metric fields are sparse updates: if a metric is absent from the subscription payload, the corresponding field is null rather than an empty wrapper.
"""
type AssetUpdateEvent {
  primaryCbrn: String
  timestamp: Time
  removedKeys: [String]
  latestPrice: LatestAssetPriceUpdate
  marketCapV2: String
  volume24hV2: String
  fullyDilutedMarketCap: String
  liquidity: String
  isWashTraded: Boolean
  launchpad: LaunchpadUpdate
  creationDateV3: String
  tradingActivity: AssetTradingActivityUpdate
  holderCount: Int
  topTenHoldersPercentageV3: Float @deprecated(reason: "Use topTenHoldersPercentageV4 instead.")
  topHolders(first: Int, after: String): TokenHolderConnection
  marketCapPercentChange24h: Float
  volumePercentChange24hV2: Float
  circulatingSupply: String
  maxSupply: String
  auditMetrics: [AuditMetrics] @deprecated(reason: "Use the individual asset audit metric fields instead.")

  """
  Sparse subscription update. Null means this event did not include a mintability audit metric update.
  """
  mintableV2: MintableV2AuditMetric

  """
  Sparse subscription update. Null means this event did not include a locked liquidity audit metric update.
  """
  lockedLiquidity: LockedLiquidityAuditMetric

  """
  Sparse subscription update. Null means this event did not include a top 10 holders audit metric update.
  """
  topTenHoldersPercentageV4: TopTenHoldersPercentageV4AuditMetric

  """
  Sparse subscription update. Null means this event did not include a coordinated holdings audit metric update.
  """
  coordinatedHoldingsPercent: CoordinatedHoldingsPercentAuditMetric

  """
  Sparse subscription update. Null means this event did not include a published contract audit metric update.
  """
  publishedContractAuditMetric: PublishedContractAuditMetric @deprecated(reason: "Use publishedContractV3 instead.")

  """
  Sparse subscription update. Null means this event did not include a published contract audit metric update.
  """
  publishedContractV3: PublishedContractAuditMetric

  """
  Sparse subscription update. Null means this event did not include a transfer fee audit metric update.
  """
  transferFeePercent: TransferFeePercentAuditMetric

  """
  Sparse subscription update. Null means this event did not include an insider holdings audit metric update.
  """
  insiderHoldingsPercent: InsiderHoldingsPercentAuditMetric

  """
  Sparse subscription update. Null means this event did not include a sniper holdings audit metric update.
  """
  sniperPercent: SniperPercentAuditMetric
  classificationData: AssetClassification
  allTimeHighV4: AllTimeHighV2
  totalSupply: String

  """
  Sparse subscription update. Null means this event did not include a cosmetic metadata update.
  """
  cosmeticMetadata: TokenCosmeticMetadataUpdate

  """
  Sparse subscription update. Null means this event did not include a graduation status update.
  """
  graduationStatus: TokenGraduationStatus

  """
  Sparse subscription update. Null means this event did not include a bonding curve progress update.
  """
  bondingCurveProgress: Float
}

