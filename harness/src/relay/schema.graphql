"""
Represents the type of liquidation event for a Defi Borrow loan.
Used to distinguish between liquidation warnings, actual liquidation notices,
and liquidation protection outcomes.
"""
enum DefiBorrowLiquidationEventKind {
  """A warning notification indicating the loan is at risk of liquidation"""
  WARNING

  """A notification indicating the loan has been liquidated"""
  LIQUIDATION

  """Liquidation protection add-collateral action completed successfully."""
  LIQUIDATION_PROTECTION_ADD_COLLATERAL_SUCCESS

  """Liquidation protection add-collateral action failed."""
  LIQUIDATION_PROTECTION_ADD_COLLATERAL_FAILED
}

"""
Balance-related eligibility for a liquidation protection type.
Contains projected values computed using the user's available balance
(min of available-to-send balance and the maximum allowed amount, if set).
"""
type DefiBorrowLiquidationProtectionBalanceEligibility {
  """
  The current available balance for liquidation protection.
  This is the minimum of the user's available-to-send balance and the maximum allowed amount (if set).
  """
  availableBalanceForLiquidationProtection: DefiBorrowAmount

  """
  Whether the user has a sufficient available-to-send balance to cover
  the full amount specified for the protection type.
  """
  hasSufficientBalance: Boolean

  """
  Projected LTV using the balance available for liquidation protection,
  between 0 and 1 (for example, 0.75 means 75%).
  Balance available is min(available-to-send, maximum allowed amount).
  """
  projectedLtvUsingAvailableBalance: Float

  """
  Projected liquidation price using the balance available for liquidation protection,
  in standard units in the debt asset per unit collateral asset.
  Stored as human-readable format: e.g., "96000" for BTC/USDC means 96000 USDC per 1 BTC,
  NOT the inverted representation (1/96000).
  """
  projectedLiquidationPriceUsingAvailableBalance: DefiBorrowAmount
}

"""
Onchain policy action that will be performed when committing a liquidation protection config update.
Implies the toggle state:
- INSTALL: First time enable (toggle ON).
- REVOKE: Disable (toggle OFF).
- REVOKE_AND_INSTALL: Update existing config (still enabled).
"""
enum DefiBorrowLiquidationProtectionConfigUpdateOnchainPolicyAction {
  INSTALL
  REVOKE
  REVOKE_AND_INSTALL
}

"""
Quoting mode for liquidation protection config updates.
- DUMMY_QUOTE: Preview only - validates and computes projected LTV without DB writes or MagicTransaction calls.
- FULL_QUOTE: Commit-ready - validates, persists quote, and prepares MagicTransaction.
"""
enum DefiBorrowLiquidationProtectionConfigUpdateQuotingMode {
  DUMMY_QUOTE
  FULL_QUOTE
}

"""Eligibility and balance checks for a protection type."""
type DefiBorrowLiquidationProtectionEligibility {
  """Whether the user is eligible for this protection type."""
  isEligible: Boolean

  """
  Human-readable reason why the user is not eligible for the protection type.
  This message is localized by the backend and can be displayed directly to the user.
  Null when isEligible is true.
  """
  ineligibilityReasonMessage: String

  """
  Balance-related eligibility for this protection type.
  Contains available balance, sufficiency check, and projected values using available balance.
  Only populated if the user has an existing configuration for the protection type.
  """
  balanceEligibility: DefiBorrowLiquidationProtectionBalanceEligibility
}

"""
Type of liquidation protection config update.
As of 2026-02-23, there are only two possible types: ADD_COLLATERAL or REPAY.
This may change in the future.
`Kind` is used instead of `Type` as `Type` is reserved.
"""
enum DefiBorrowLiquidationProtectionKind {
  ADD_COLLATERAL
  REPAY
}

"""
User-level liquidation protection user config for a loan.
Contains per-protection-type configurations (addCollateral, repay) and pending action status.
"""
type DefiBorrowLiquidationProtectionLoanConfig {
  """Add collateral protection configuration."""
  addCollateral: DefiBorrowLiquidationProtectionTypeConfig

  """Repay protection configuration."""
  repay: DefiBorrowLiquidationProtectionTypeConfig

  """
  Whether a policy action (install, revoke, or revoke-and-install) is currently
  in progress for this loan. When true, the UI should show a pending spinner and
  block the user from initiating any new liquidation protection config updates.
  """
  hasPendingPolicyAction: Boolean
}

"""
Status of the loan's liquidation protection.
As of 2026-02-23, there are only two possible states: ENABLED or DISABLED.
This may change in the future.
"""
enum DefiBorrowLiquidationProtectionLoanProtectionStatus {
  ENABLED
  DISABLED
}

"""Market-level configuration for liquidation protection."""
type DefiBorrowLiquidationProtectionMarketConfig {
  """
  System-configured LTV at which protection triggers. Expressed in percentage terms (e.g., 0.75 -> 75%).
  """
  triggerLtv: Float

  """
  Liquidation LTV for the market. Expressed in percentage terms (e.g., 0.75 -> 75%).
  """
  liquidationLtv: Float

  """Available protection types for this market."""
  protectionTypesAvailable: [DefiBorrowLiquidationProtectionKind]

  """Policy validity period in days."""
  policyValidityDays: Int

  """Indicates if liquidation protection is enabled for the market."""
  isEnabled: Boolean

  """
  Trigger LTV as a decimal string between 0 and 1 (e.g., "0.77" for 77%).
  Avoids floating-point precision issues with triggerLtv.
  """
  triggerLtvPercentage: String
}

"""
Per-protection-type configuration wrapper (AddCollateral or Repay).
Contains both config and eligibility for that type.
"""
type DefiBorrowLiquidationProtectionTypeConfig {
  """Current config for this protection type."""
  userConfig: DefiBorrowLiquidationProtectionUserConfig

  """Eligibility for configuring this protection type."""
  eligibility: DefiBorrowLiquidationProtectionEligibility

  """
  Recommended amount for this protection type.
  Calculates the amount needed to bring the loan's LTV back to the market's
  default LTV when the trigger LTV is hit due to collateral price drop.
  """
  recommendedAmount: DefiBorrowAmount
}

"""
User-configurable and computed liquidation protection state for a protection type.
"""
type DefiBorrowLiquidationProtectionUserConfig {
  """
  Indicates the current protection status of the loan.
  Think about it as "Will liquidation protection kick in for the user?
  Will the user see their liquidation protection as enabled in their UI?"
  """
  loanProtectionStatus: DefiBorrowLiquidationProtectionLoanProtectionStatus

  """
  Maximum amount of collateral/repay asset authorized for a single liquidation protection transaction.
  """
  maximumAllowedAmount: DefiBorrowAmount

  """
  Projected LTV using the configured maximum allowed amount, between 0 and 1 (for example, 0.75 means 75%).
  Computed by backend based on current loan state and the trigger price (the price at which LP fires).
  """
  projectedLtvUsingMaximumAllowedAmount: Float

  """
  Projected liquidation price using the configured maximum allowed amount,
  in standard units in the debt asset per unit collateral asset.
  Stored as human-readable format: e.g., "96000" for BTC/USDC means 96000 USDC per 1 BTC,
  NOT the inverted representation (1/96000).
  """
  projectedLiquidationPriceUsingMaximumAllowedAmount: DefiBorrowAmount

  """When the onchain policy expires (null if no active policy)."""
  policyExpiresAt: Time

  """
  Whether a liquidation protection transaction has successfully triggered for this
  protection type. When true, the UI should display a banner prompting the user to
  re-enable protection.
  """
  hasSuccessfulDefiBorrowLiquidationProtectionTransaction: Boolean
}

"""A defi borrow loan"""
