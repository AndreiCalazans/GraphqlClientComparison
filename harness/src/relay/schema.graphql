  """
  Returns the MerchantProducts owned by the current merchant, paginated.
  The field is namespaced (`merchantProducts`) to avoid a collision with the
  retail-brokerage `Viewer.products` field in the `mono` subgraph.
  """
  merchantProducts(
    first: Int = 20
    after: String
    status: ProductStatus

    """
    Case-insensitive substring filter on the product name only. Distinct from
    `query` (which also searches descriptions) — use `nameQuery` when you need
    to match the name field exclusively. Mirrors PLM's `name_query`, which is
    intentionally kept as a narrower filter alongside `query`.
    """
    nameQuery: String

    """
    Filters results to a single pricing mode (FIXED_PRICE or FLEXIBLE_PRICE).
    When omitted, products of all pricing modes are returned. Backs the
    Products list UI's pricing-type filter server-side.
    """
    pricingMode: PricingMode

    """
    Case-insensitive substring filter matching the product name OR
    description. Unlike `nameQuery` (name only), `query` searches both fields
