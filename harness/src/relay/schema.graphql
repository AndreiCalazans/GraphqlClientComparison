type Portfolio {
  id: ID
  uuid: Uuid
  name: String
  type: PortfolioType
  currency: String

  """
  Returns the breakdown for a given portfolio. This includes all spot, perp, and derivative positions as well as balance summaries
  """
  breakdown(currency: String): PortfolioBreakdown @deprecated(reason: "This is not the right way of getting the user breakdowns, use a combination spot and futures positions methods instead")

  """
  summary of the user portfolio including total balances and number of positions contained
  """
  summary: PortfolioSummary

  """Returns the spot positions for the given portfolio"""
  spotPositions(
    assetSymbol: String
    currency: String
    cashFilter: CashFilter
    cashFilters: [CashFilter!]

    """optional filter by underlying CBRN (e.g. for equity options)"""
    underlyingCbrn: String
    first: Int! = 10
    after: String
    sortField: PortfolioPositionSortField
    order: SortOrder = DESC

    """If true, allows partial balances to be included in the result"""
    allowPartialBalances: Boolean

    """
    optional list of account types - any accounts matching a type in this list will roll up into their own line item
    """
    delineatedAccountTypes: [AccountType!]
    platform: AssetPlatform
  ): PortfolioSpotPositionConnection

  """
  Returns the spot positions for the given portfolio
  Differs from spotPositions in that v2 includes INTX balances within Default portfolio positions
  DO NOT USE, still in development as part of UTP (Unified Trading Portfolio)
  """
  spotPositionsV2(
    assetSymbol: String
    currency: String
    cashFilter: CashFilter
    cashFilters: [CashFilter!]

    """optional filter by underlying CBRN (e.g. for equity options)"""
    underlyingCbrn: String
    first: Int! = 10
    after: String
    sortField: PortfolioPositionSortField
    order: SortOrder = DESC
    allowPartialBalances: Boolean

    """
    optional list of account types - any accounts matching a type in this list will roll up into their own line item
    """
    delineatedAccountTypes: [AccountType!]
    platform: AssetPlatform
  ): PortfolioSpotPositionConnection

  """Returns the prediction markets positions for the given portfolio"""
  predictionMarketsPositions(
    """
    Optional CBRN to filter positions.
    - If isEvent is false or not provided: treats as a Market CBRN and returns only the positions matching this CBRN
    - If isEvent is true: treats as an event CBRN and returns all positions under that event
    If not provided, returns all positions (with pagination).
    """
    productCbrn: String

    """
    Indicates whether the productCbrn is an event CBRN (true) or a market/product CBRN (false/not provided).
    Defaults to false.
    """
    isEvent: Boolean

    """optional quote cbrn for currency conversions"""
    quoteCbrn: String

    """Returns the first n positions (used for forward pagination)"""
    first: Int

    """Returns positions after the given cursor (used with first)"""
    after: String

    """Returns the last n positions (used for backward pagination)"""
    last: Int

    """Returns positions before the given cursor (used with last)"""
    before: String

    """Field to sort positions by"""
    sortField: PredictionMarketPositionSortField

    """
    Sort order (ascending or descending).
    If not provided, defaults to descending.
    """
    order: SortOrder

    """
    If true, excludes positions with $0 payout value (settled and payout is $0)
    """
    excludeZeroPayouts: Boolean
  ): PredictionMarketPositionConnection

  """
  Combined buying power for this portfolio. Powers L1 display.
  currency is the seed — PS expands to full CBP group (e.g. USD → USD + USDC).
  """
  combinedBuyingPower(currency: String!): CombinedBuyingPowerResult

  """
  Returns a balance summary for this portfolio. Powers L2 display.
  When `withCombinedBuyingPower` is true, the AVAILABLE_TO_TRADE summary
  includes combined buying power across CBP-equivalent currencies (e.g. USD + USDC).
  The flag has no effect for categories other than AVAILABLE_TO_TRADE.
  Behavior is identical to the existing per-asset BalanceSummaryV2 when the flag is
  omitted or false (fully additive / backward-compatible).
  """
  balanceSummary(category: BalanceSummaryCategory!, currency: String, withCombinedBuyingPower: Boolean): BalanceSummaryV2
}

