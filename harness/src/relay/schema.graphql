  """
  Trading volume (USD) for each candle, aligned 1:1 with quotePrices/quoteTimestamps. Null when the data source does not provide per-candle volume.
  """
  quoteVolumes: [String]

  """
  Open price in the requested quoteCurrency for each candle, aligned 1:1 with quotePrices/quoteTimestamps. Null when the data source does not provide OHLC data (e.g. CEX/AS2 assets).
  """
  quoteOpens: [String]

  """
  High price in the requested quoteCurrency for each candle, aligned 1:1 with quotePrices/quoteTimestamps. Null when the data source does not provide OHLC data (e.g. CEX/AS2 assets).
  """
  quoteHighs: [String]

  """
  Low price in the requested quoteCurrency for each candle, aligned 1:1 with quotePrices/quoteTimestamps. Null when the data source does not provide OHLC data (e.g. CEX/AS2 assets).
  """
  quoteLows: [String]

  """Overall percent change for the chart period"""
  percentChange: Float

  """Scaling factor for the chart y-axis"""
  yAxisScalingFactor: Float

  """Percent changes across all time windows"""
  percentChanges: PercentChangesV2
}

