"""
A discoverable app in the Base ecosystem, surfaced on the Discover tab.

Backed by base-dev-backend's `DiscoverAppEntry`. All fields are
nullable (except `id`) so that the resolver can map sparsely-populated upstream
data without forcing clients to handle errors when an optional metadata field
is missing.
"""
type DiscoverApp {
  """
  Stable identifier for the app. Sourced from base-dev-backend's project id
  when available, otherwise derived from the canonical app URL.
  """
  id: ID!

  """Display name of the app."""
  name: String

  """Short description (max ~30 characters), suitable for list rows."""
  tagline: String

  """Longer description (max ~170 characters), suitable for detail views."""
  description: String

  """Icon image URL."""
  iconUrl: String

  """Primary URL of the app."""
  appUrl: String

  """Ordered list of screenshot URLs for the app's detail-view gallery."""
  screenshotUrls: [String]

  """Hero / OG image URL used for large previews."""
  thumbnailUrl: String

  """
  Editorial category for the app. Mapped 1:1 from base-dev-backend's
  `Category` proto enum; unknown upstream values are surfaced as `OTHER`.
  
  NOTE: this enum is named `DiscoverAppCategory` rather than `AppCategory`
  because the schema already has an unrelated `type AppCategory` (defined
  in `viewer_apps.graphql`) used by the legacy Apps tab.
  """
  category: DiscoverAppCategory
}

"""
Editorial category for a `DiscoverApp`. Mirrors base-dev-backend's `Category`
proto enum 1:1.
"""
enum DiscoverAppCategory {
  """Games and interactive experiences."""
  GAMING

  """Social networking and community apps."""
  SOCIAL

  """DeFi, payments, and financial tools."""
  FINANCE

  """General-purpose utility apps."""
  UTILITY

  """Productivity and workflow tools."""
  PRODUCTIVITY

  """Health, fitness, and wellness apps."""
  HEALTH_AND_FITNESS

  """News, media, and content aggregation."""
  NEWS_MEDIA

  """Music streaming and audio apps."""
  MUSIC

  """Commerce and marketplace apps."""
  SHOPPING

  """Educational content and learning platforms."""
  EDUCATION

  """Tools and utilities for developers."""
  DEVELOPER_TOOLS

  """Entertainment and media apps."""
  ENTERTAINMENT

  """Art, design, and creative tools."""
  ART_CREATIVITY

  """Apps that don't fit an existing category."""
  OTHER
}

"""Relay-style connection wrapping a page of `DiscoverApp` edges."""
type DiscoverAppConnection {
  """The list of app edges in this page."""
  edges: [DiscoverAppEdge]

  """Pagination metadata for this connection."""
  pageInfo: PageInfo
}

"""A single edge in the `DiscoverAppConnection`."""
type DiscoverAppEdge {
  """
  Cursor for resuming pagination after this edge — supply as the `after`
  argument to fetch the next page.
  """
  cursor: String

  """The app at this position in the discover feed."""
  node: DiscoverApp
}

