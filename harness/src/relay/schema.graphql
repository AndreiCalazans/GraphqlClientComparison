"""
A Bitcoin onchain transaction record.

Bitcoin transactions are sourced from utxo-indexer-service via tx-history-service
and present a simplified, single-transfer view: each transaction is classified
as a SEND or RECEIVE relative to the user's xpub, with a single aggregated
transfer of native BTC derived from the underlying UTXO set. Raw multi-input/
multi-output UTXO detail is not surfaced today.

Pending/mempool transactions are served by a separate code path and are not
returned through this resolver — every transaction surfaced here is already
confirmed on-chain (CONFIRMED or FAILED).
"""
type BaseAppBitcoinHistoricalTransaction implements BaseAppHistoricalTransaction {
  """The globally unique identifier for this transaction"""
  id: ID

  """The hash (txid) of this transaction"""
  hash: String

  """
  The transaction's timestamp in seconds since the Unix epoch. Block timestamp
  for confirmed transactions; mempool entry time for unconfirmed (PENDING)
  transactions, since they don't yet belong to a block.
  """
  timestamp: String

  """
  The network ID where this transaction occurred (always a Bitcoin network)
  """
  networkId: ThirdPartyIdString

  """
  The fee paid for this transaction, in satoshis (base units of BTC, 8 decimals).
  The fee is always paid in native BTC; there is no fee asset variation on Bitcoin.
  """
  feeAmount: String

  """
  The status of this transaction. Bitcoin transactions surface as CONFIRMED once
  on-chain or FAILED if the chain rejected them. Pending/mempool transactions
  are served by a separate code path and are not returned through this resolver.
  """
  status: BaseTransactionStatus

  """
  The primary action that took place in this transaction (SEND or RECEIVE).
  Bitcoin has no swap or contract-interaction variants on this path.
  """
  primaryAction: BaseAppBitcoinHistoricalTransactionPrimaryAction

  """
  The asset transfers relevant to the user's xpub. Always contains exactly one
  entry — the aggregated native BTC transfer derived from the transaction's
  UTXO set. Transactions that cannot be retrieved upstream surface as a resolver
  error, not an empty list.
  """
  assetTransfers: [BaseAppHistoricalTransactionBitcoinTransferDetails]

  """
  The price (USD) of each transferred asset at the time of this transaction.
  Returned as an empty array today: no provider in tx-history-service populates
  this field for any chain, including Bitcoin. The field exists for parity
  with the BaseAppHistoricalTransaction interface and to absorb prices once
  the upstream pricing-service integration lands.
  """
  historicalAssetPricesUsd: [AssetPrice]

  """
  The block height in which this transaction was confirmed. `0` for unconfirmed
  (PENDING) transactions, which lack a block.
  """
  blockHeight: String
}

"""
Bitcoin primary action. Limited to SEND or RECEIVE; no swap or contract-call
metadata is produced for Bitcoin transactions.
"""
type BaseAppBitcoinHistoricalTransactionPrimaryAction implements BaseAppHistoricalTransactionPrimaryAction {
  """The type of action (SEND or RECEIVE)"""
  type: Label

  """
  Metadata associated with this primary action type. Empty today; reserved for future per-classification hints.
  """
  metadata: [ActionMetadata]
}

"""
Network information for a Bitcoin network.
Similar to EthereumNetwork but for Bitcoin chains.
"""
type BaseAppBitcoinNetwork implements BaseAppNetwork {
  """Unique identifier for the Bitcoin network"""
  id: ID

  """The network ID (e.g., "networks/bitcoin-mainnet")"""
  networkId: NetworkId

  """Human-readable display name for the network"""
  displayName: String

  """URL to the network's image/icon"""
  networkImageURL: String

  """The native asset/token of the Bitcoin network"""
  nativeAsset: BaseAppBitcoinToken
}

"""
A union of all possible Bitcoin-specific onchain mutations.

Today only token transfers — Bitcoin doesn't have swaps, approvals, or
smart-contract calls at the protocol level. Exposed for parity with the
Solana/EVM mutations field so frontends can use a single rendering pipeline
across all chains.
"""
union BaseAppBitcoinOnchainMutation = BaseAppBitcoinTokenTransferMutation

"""The status of a Bitcoin transaction"""
enum BaseAppBitcoinOnchainTransactionStatus {
  """Unspecified status"""
  TRANSACTION_STATUS_UNSPECIFIED

  """The transaction is awaiting execution"""
  TRANSACTION_STATUS_PENDING

  """The transaction was dropped"""
  TRANSACTION_STATUS_DROPPED

  """The transaction was executed onchain, but failed"""
  TRANSACTION_STATUS_FAILED_ONCHAIN

  """The transaction was successfully executed onchain"""
  TRANSACTION_STATUS_COMPLETED
}

