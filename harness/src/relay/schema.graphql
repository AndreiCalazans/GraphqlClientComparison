  """Maximum leverage supported on this market."""
  maxLeverage: Int

  """Default leverage recommended for this market."""
  defaultLeverage: Int

  """Funding interval, expressed in milliseconds."""
  fundingIntervalInMs: Int

  """
  Minimum price increment (tick size) for orders on this market, as a decimal string. e.g. "0.01".
  """
  minPriceIncrement: String

  """
  Minimum size increment (lot size) for orders on this market, as a decimal string. e.g. "0.0001".
  """
  minSizeIncrement: String

  """
  Minimum order notional value for this market. Denominated in the fiat currency
  specified by the enclosing query's `fiatCurrencyCode` argument (defaults to USD).
  Decimal string, e.g. "10.00".
  """
  minNotional: String

  """
  Live pricing and funding snapshot for this market. Resolved only when the
  client selects this field.
  """
