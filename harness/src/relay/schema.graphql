  """
  DEPRECATED - tier is the tier of the plan, i.e. Basic or Premium (equivalent to Unlimited in tierV2)
  """
  tier: CoinbaseSubscriptionTier @deprecated(reason: "use tierV3 instead")

  """
  DEPRECATED - tierV2 is the tier of the plan, i.e. Basic, Unlimited, or Premium
  """
  tierV2: CoinbaseSubscriptionTierV2 @deprecated(reason: "use tierV3 instead")

  """
  tierV3 is the tier of the plan, i.e. 1 (Basic), 2 (Preferred), or 3 (Premium)
  """
  tierV3: CoinbaseSubscriptionTierV3

  """type is the type of plan, i.e. Standard or Pause"""
  type: CoinbaseSubscriptionPlanType

  """
  billingFrequency is the frequency at which the user is billed, i.e. Monthly or Annual
  """
  billingFrequency: CoinbaseSubscriptionBillingFrequency! @deprecated(reason: "use planBillingFrequency instead")

  """price is the amount the user is charged for the plan"""
  price: Amount!

  """benefits is the list of benefits the user is entitled to with the plan"""
  benefits: [CoinbaseSubscriptionPlanBenefit]!

  """
  planBillingFrequency is the billing frequency of the plan and supports more granularity
  """
  planBillingFrequency: CoinbaseSubscriptionPlanBillingFrequency!

  """
  promotion is the promotion associated with the plan which can be time-limited or permanent
  """
  promotion: CoinbaseSubscriptionPromotion

  """proratedPrice is the prorated price of the plan"""
  proratedPrice: Amount @deprecated(reason: "use proratedPrice in CoinbaseSubscriptionPlanMigrationMetadata instead")

