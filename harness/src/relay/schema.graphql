  """
  Cloudflare-resolved ISO 3166-1 alpha-2 country code (e.g. `US`, `CA`,
  `UA`). Null when the edge did not resolve the caller. Reflects the
  override header `X-Cf-Ipcountry-Override` only when the spoofing
  allowlist permits, matching `LocationService` rules.
